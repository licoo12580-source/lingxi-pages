<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>📡 灵犀固件 · 下载</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--card:#1e293b;--border:#334155;--fg:#e2e8f0;--m:#64748b;--accent:#3b82f6;--green:#22c55e;--red:#ef4444;--orange:#f59e0b;--purple:#8b5cf6}
body{background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,sans-serif;padding:16px;max-width:960px;margin:0 auto;font-size:14px}
h1{font-size:22px;margin-bottom:2px;display:flex;align-items:center;gap:8px}
.sub{color:var(--m);font-size:12px;margin-bottom:16px}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--card);border-radius:10px;padding:3px;width:fit-content}
.tab{padding:6px 16px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--m);border:none;background:transparent;transition:all .15s}
.tab.active{background:var(--accent);color:#fff}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.card h3{font-size:14px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.fw-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(51,65,85,.3)}
.fw-item:last-child{border-bottom:none}
.fw-info{flex:1}
.fw-ver{font-weight:600;font-size:14px}
.fw-date{color:var(--m);font-size:11px;margin-left:8px}
.fw-desc{color:var(--m);font-size:12px;margin-top:2px}
.fw-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:500}
.tag-green{background:#14532d;color:var(--green)}
.tag-blue{background:#1e3a5f;color:var(--accent)}
.tag-orange{background:#5c3d1a;color:var(--orange)}
.fw-actions{display:flex;gap:6px;margin-left:12px;flex-shrink:0}
.btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;border:none;cursor:pointer;text-decoration:none;display:inline-block;transition:all .15s}
.btn-download{background:var(--accent);color:#fff}
.btn-download:hover{background:#2563eb}
.btn-merge{background:var(--purple);color:#fff}
.btn-merge:hover{background:#7c3aed}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#16a34a}
.dropzone{border:2px dashed var(--border);border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:12px}
.dropzone:hover,.dropzone.dragover{border-color:var(--accent);background:rgba(59,130,246,.05)}
.dropzone-icon{font-size:42px;color:var(--m);margin-bottom:6px}
.dropzone-text{color:var(--m);font-size:13px}
textarea{width:100%;background:#0f172a;border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--fg);font-family:monospace;font-size:12px;resize:vertical;min-height:120px;margin-bottom:8px}
.upload-row{display:flex;gap:8px;margin-bottom:8px}
.upload-row input{flex:1;background:#0f172a;border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--fg);font-size:13px}
.upload-row input:focus{outline:none;border-color:var(--accent)}
.status-msg{padding:8px 12px;border-radius:6px;font-size:12px;margin-top:8px;display:none}
.status-ok{background:#14532d;color:var(--green);display:block}
.status-err{background:#5c1a1a;color:var(--red);display:block}
.hidden{display:none}
</style>
</head>
<body>

<h1>📡 灵犀固件</h1>
<div class="sub">ESP32-S3 · 显示屏固件 · 合并BIN一行烧录</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('download')">⬇ 下载</button>
  <button class="tab" onclick="switchTab('upload')">📤 上传</button>
</div>

<div id="tab-download">
  <div id="fw-list"></div>
</div>

<div id="tab-upload" class="hidden">
  <div class="card">
    <h3>📤 上传新固件</h3>
    <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()">
      <div class="dropzone-icon">📦</div>
      <div class="dropzone-text">拖拽文件到此处，或点击选择文件</div>
    </div>
    <input type="file" id="fileInput" style="display:none" multiple onchange="handleFiles(this.files)">
    <div style="margin:8px 0"><span style="color:var(--m);font-size:12px">或手动粘贴内容：</span></div>
    <div class="upload-row">
      <input type="text" id="pasteFilename" placeholder="文件名 (如 v0628-demo-v5-merged.bin)">
    </div>
    <textarea id="pasteContent" placeholder="在此粘贴固件BIN文件的Base64或源码内容..."></textarea>
    <button class="btn btn-green" onclick="uploadPaste()">📤 提交上传</button>
    <div id="uploadStatus" class="status-msg"></div>
  </div>
</div>

<script>
const OWNER = 'licoo12580-source';
const REPO = 'lingxi';
const BRANCH = 'firmware-demo-screen';
const BASE_RAW = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/firmware`;

// firmware列表 — 最新排最前
const FW = [
  {ver:"display-baseline", date:"2026-06-28", tags:["基线","LovyanGFX","红绿蓝"], files:{merge:"display-baseline-merged.bin"}, desc:"🔥 最小验证工程: 独立工程,不依赖主固件. 红→绿→蓝循环"},
  {ver:"v0628-demo-v4", date:"2026-06-28", tags:["LovyanGFX","LVGL9.5","中文UI","功能完整"], files:{merge:"v0628-demo-v4-merged.bin"}, desc:"演示版v4: 中文三页+触摸+OTA+WDT禁用"},
  {ver:"v0628-demo-v3", date:"2026-06-28", tags:["LovyanGFX","LVGL9.5","中文UI"], files:{merge:"v0628-demo-v3-merged.bin"}, desc:"演示版v3: 修复触摸+色块"},
  {ver:"v0628-demo-v2", date:"2026-06-28", tags:["LovyanGFX","bitbang I2C","启动验证"], files:{merge:"v0628-demo-v2-merged.bin"}, desc:"v2修复: bitbang I2C替代硬件I2C(不崩溃)"},
  {ver:"v0628-demo-v1", date:"2026-06-28", tags:["LovyanGFX","bitbang I2C","启动验证"], files:{merge:"v0628-demo-v1-merged.bin"}, desc:"最小可用: bitbang I2C触控+SPI2_HOST显示"},
  {ver:"v0628-cs-port-r3", date:"2026-06-28", tags:["cs_port","串口屏","纯文本"], files:{merge:"v0628-cs-port-r3-merged.bin"}, desc:"cs_port移植r3: 串口+屏幕输入输出"},
  {ver:"v0628-cs-port-r2", date:"2026-06-28", tags:["cs_port","串口屏"], files:{merge:"v0628-cs-port-r2-merged.bin"}, desc:"cs_port移植r2: 重构输入处理"},
  {ver:"v0628-cs-port-r1", date:"2026-06-28", tags:["cs_port","串口屏"], files:{merge:"v0628-cs-port-r1-merged.bin"}, desc:"cs_port移植r1: 首次可用版本"},
];

function render() {
  const container = document.getElementById('fw-list');
  container.innerHTML = FW.map(f => {
    let tags = (f.tags||[]).map(t => {
      let cls = 'tag-green';
      if(t.includes('基线')) cls = 'tag-orange';
      else if(t.includes('cs_port')) cls = 'tag-blue';
      return `<span class="tag ${cls}">${t}</span>`;
    }).join('');

    let actions = '';
    if (f.files.merge) actions += `<a class="btn btn-merge" href="${BASE_RAW}/${f.files.merge}" download>合并</a>`;

    return `<div class="fw-item">
      <div class="fw-info">
        <span class="fw-ver">${f.ver}</span>
        <span class="fw-date">${f.date}</span>
        <div class="fw-desc">${f.desc}</div>
        <div class="fw-tags">${tags}</div>
      </div>
      <div class="fw-actions">${actions}</div>
    </div>`;
  }).join('');
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-download').classList.toggle('hidden', name !== 'download');
  document.getElementById('tab-upload').classList.toggle('hidden', name !== 'upload');
}

// Upload
const UPLOAD_API = 'http://localhost:3000/api/upload-paste';

function handleFiles(files) {
  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('pasteFilename').value = file.name;
      document.getElementById('pasteContent').value = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function uploadPaste() {
  const filename = document.getElementById('pasteFilename').value.trim();
  const content = document.getElementById('pasteContent').value.trim();
  const status = document.getElementById('uploadStatus');

  if (!filename || !content) {
    status.className = 'status-msg status-err';
    status.textContent = '请填写文件名和内容';
    return;
  }

  try {
    const resp = await fetch(UPLOAD_API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({filename, content})
    });
    if (resp.ok) {
      status.className = 'status-msg status-ok';
      status.textContent = `✅ ${filename} 上传成功`;
      document.getElementById('pasteFilename').value = '';
      document.getElementById('pasteContent').value = '';
    } else {
      throw new Error(`HTTP ${resp.status}`);
    }
  } catch(e) {
    // fallback: 复制到聊天
    const text = `【文件名】${filename}\n【内容】\n${content.substring(0,500)}...`;
    await navigator.clipboard.writeText(text);
    status.className = 'status-msg status-err';
    status.innerHTML = `❌ 后端不可用。已复制到剪贴板，请直接发到聊天。<br><span style="font-size:11px;color:var(--m)">${e.message}</span>`;
  }
}

render();
</script>
</body>
</html>
