<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>📤 灵犀 · 上传中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b1120;color:#e2e8f0;font-family:system-ui,sans-serif;padding:30px 20px;max-width:800px;margin:0 auto}
h1{font-size:22px;margin-bottom:4px}
.sub{color:#64748b;font-size:13px;margin-bottom:6px}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px;margin-bottom:16px}
label{display:block;font-size:13px;color:#94a3b8;margin-bottom:6px;font-weight:600}
input[type=text]{width:100%;padding:10px 14px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:14px;margin-bottom:16px}
input[type=text]:focus{outline:none;border-color:#3b82f6}
textarea{width:100%;min-height:350px;padding:14px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:13px;font-family:'Courier New',monospace;line-height:1.5;resize:vertical}
textarea:focus{outline:none;border-color:#3b82f6}
.btn{padding:10px 24px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;transition:background .2s}
.btn:hover{background:#2563eb}
.btn:disabled{background:#334155;cursor:not-allowed}
.btn.green{background:#059669}
.btn.green:hover{background:#047857}
.status{margin-top:12px;padding:12px 14px;border-radius:8px;font-size:13px;display:none}
.status.ok{display:block;background:#22c55e22;border:1px solid #22c55e44;color:#22c55e}
.status.err{display:block;background:#ef444422;border:1px solid #ef444444;color:#ef4444}
.status.info{display:block;background:#3b82f622;border:1px solid #3b82f644;color:#60a5fa}
.fallback-box{display:none;margin-top:16px}
.fallback-box.show{display:block}
.fallback-box textarea{min-height:100px;margin-top:8px}
.hint{font-size:11px;color:#64748b;margin-top:6px}
.back{display:inline-block;margin-top:20px;color:#64748b;font-size:13px;text-decoration:none}
.back:hover{color:#3b82f6}
</style>
</head>
<body>
<h1>📤 灵犀 · 上传中心</h1>
<p class="sub">把资料粘贴到下面提交，风止会自动读取处理</p>

<div class="card">
  <label>📄 文件名</label>
  <input type="text" id="filename" placeholder="例如: CL40BC299-40A_init_seq.txt 或 test_all.cpp">
  
  <label>📝 粘贴内容</label>
  <textarea id="content" placeholder="在此粘贴代码、配置文件、规格书..."></textarea>
  
  <button class="btn" id="submitBtn" onclick="submitPaste()">📤 提交</button>
  <div class="hint">提交后我会收到通知，自动读取处理</div>
  
  <div class="status" id="status"></div>
  
  <div class="fallback-box" id="fallbackBox">
    <hr style="border-color:#334155;margin:16px 0">
    <p style="color:#f59e0b;font-size:13px;margin-bottom:8px">⚠️ 如果服务器连接失败，请复制下面内容后直接在飞书/微信发给我</p>
    <textarea id="fallbackText" readonly></textarea>
    <button class="btn green" onclick="copyFallback()">📋 复制并发送</button>
  </div>
</div>

<a class="back" href="firmware.html">← 返回固件下载中心</a>

<script>
const API = 'http://43.155.153.59:3000/api/upload-paste';

let lastContent = '';
let lastFilename = '';

function submitPaste() {
  lastFilename = document.getElementById('filename').value.trim();
  lastContent = document.getElementById('content').value.trim();
  const btn = document.getElementById('submitBtn');
  const status = document.getElementById('status');
  const fallbackBox = document.getElementById('fallbackBox');
  
  if (!lastFilename) { showStatus('请填写文件名', 'err'); return; }
  if (!lastContent) { showStatus('请粘贴内容', 'err'); return; }
  
  btn.disabled = true;
  btn.textContent = '提交中...';
  status.className = 'status';
  status.style.display = 'none';
  fallbackBox.classList.remove('show');
  
  fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ filename: lastFilename, content: lastContent })
  })
  .then(r => r.json())
  .then(data => {
    if (data.status === 'ok') {
      showStatus(`✅ 提交成功！文件: ${data.file} (${data.size > 1024 ? (data.size/1024).toFixed(1)+'KB' : data.size+'字符'})`, 'ok');
      document.getElementById('content').value = '';
      document.getElementById('filename').value = '';
    } else {
      showStatus(`❌ 失败: ${data.error || '未知错误'}`, 'err');
      showFallback();
    }
  })
  .catch(e => {
    showStatus(`⚠️ 无法连接后端服务器 (${e.message})`, 'info');
    showFallback();
  })
  .finally(() => {
    btn.disabled = false;
    btn.textContent = '📤 提交';
  });
}

function showFallback() {
  const box = document.getElementById('fallbackBox');
  const textarea = document.getElementById('fallbackText');
  textarea.value = `【文件名】${lastFilename}\n【内容】\n${lastContent}`;
  box.classList.add('show');
}

function copyFallback() {
  const text = document.getElementById('fallbackText').value;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.green');
    btn.textContent = '✅ 已复制，请粘贴到飞书/微信';
    setTimeout(() => btn.textContent = '📋 复制并发送', 3000);
  }).catch(() => {
    document.getElementById('fallbackText').select();
    document.execCommand('copy');
    alert('已复制，请粘贴到飞书/微信');
  });
}

function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + type;
  el.style.display = 'block';
}
</script>
</body>
</html>
