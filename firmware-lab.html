<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🔬 灵犀 Firmware Lab · 嵌入式研发控制台</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
/* ===== 核心主题变量 ===== */
:root {
  --bg: #0b0e17;
  --bg2: #111827;
  --bg3: #1e293b;
  --border: #1e3a5f;
  --fg: #e2e8f0;
  --muted: #64748b;
  --accent: #3b82f6;
  --green: #22c55e;
  --yellow: #eab308;
  --red: #ef4444;
  --purple: #a855f7;
  --pink: #ec4899;
  --orange: #f97316;
  --sidebar-w: 280px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,sans-serif;overflow:hidden;height:100vh}
/* ===== 布局 ===== */
.fw-lab{display:flex;height:100vh}
/* ===== 侧栏 ===== */
.sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.sidebar-header .sub{font-size:11px;color:var(--muted);margin-top:2px}
.sidebar-tree{flex:1;overflow-y:auto;padding:8px 0}
.tree-node{padding:4px 12px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;transition:all .15s;border-left:3px solid transparent}
.tree-node:hover{background:rgba(59,130,246,.08)}
.tree-node.active{background:rgba(59,130,246,.12);border-left-color:var(--accent)}
.tree-node .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tree-node .tag{padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600;letter-spacing:.3px}
.tree-node .ver{font-weight:500;white-space:nowrap}
.tree-node .date{font-size:10px;color:var(--muted);margin-left:auto}
.tree-group{padding-left:8px}
.tree-group-label{padding:8px 12px 4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
/* ===== 主区域 ===== */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 12px;background:var(--bg2);flex-shrink:0;overflow-x:auto}
.tab{padding:10px 16px;font-size:12px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--fg)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{flex:1;overflow-y:auto;padding:16px;display:none}
.tab-content.active{display:block}
/* ===== 版本详情卡 ===== */
.detail-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.detail-card h2{font-size:14px;font-weight:600;margin-bottom:8px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.detail-item{font-size:12px}
.detail-item label{color:var(--muted);display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
/* ===== 测试任务卡 ===== */
.test-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.test-card h3{font-size:13px;font-weight:600;margin-bottom:8px}
.test-step{padding:6px 0;font-size:12px;display:flex;align-items:center;gap:8px}
.test-step .step-num{width:20px;height:20px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.test-action-btn{padding:6px 12px;border:none;border-radius:6px;cursor:pointer;font-size:11px;font-weight:500}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{filter:brightness(1.1)}
.btn-success{background:#166534;color:var(--green)}
.btn-danger{background:#7f1d1d;color:var(--red)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-outline:hover{border-color:var(--accent);color:var(--fg)}
/* ===== 问题 ===== */
.issue-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px}
.issue-card .title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.issue-card .meta{font-size:11px;color:var(--muted);margin-top:4px}
.issue-card .meta span{margin-right:12px}
/* ===== 历史问题搜索 ===== */
.search-box{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;width:100%;color:var(--fg);font-size:13px;margin-bottom:12px;outline:none}
.search-box:focus{border-color:var(--accent)}
/* ===== Dashboard 统计 ===== */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat-card .num{font-size:28px;font-weight:700}
.stat-card .label{font-size:11px;color:var(--muted);margin-top:2px}
/* ===== 确认面板 ===== */
.confirm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}
.confirm-group{font-size:12px}
.confirm-group label{font-size:11px;font-weight:500;display:block;margin-bottom:4px}
.confirm-group select{padding:6px 8px;border:1px solid var(--border);border-radius:6px;background:var(--bg3);color:var(--fg);font-size:11px;width:100%;outline:none}
/* ===== 闪存中心 ===== */
.cmd-box{background:#000;border:1px solid var(--border);border-radius:6px;padding:10px;font-family:'JetBrains Mono','Fira Code',monospace;font-size:11px;line-height:1.6;overflow-x:auto;margin:6px 0}
.copy-btn{padding:4px 10px;border:none;border-radius:4px;cursor:pointer;font-size:10px;font-weight:500;background:var(--bg3);color:var(--muted)}
.copy-btn:hover{background:var(--accent);color:#fff}
/* ===== 滚回 ===== */
.rollback-area{background:linear-gradient(135deg,#1e3a5f,#111827);border:1px solid var(--accent);border-radius:10px;padding:14px;margin:12px 0}
.rollback-area .big-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.rollback-area .big-btn:hover{filter:brightness(1.1)}
/* ===== 折叠 ===== */
.collapse{overflow:hidden;transition:max-height .3s ease;max-height:0}
.collapse.open{max-height:2000px}
/* ===== 上传按钮 ===== */
.upload-area{border:1px dashed var(--border);border-radius:8px;padding:20px;text-align:center;margin:8px 0;cursor:pointer;transition:all .2s}
.upload-area:hover{border-color:var(--accent);background:rgba(59,130,246,.05)}
.upload-area .icon{font-size:24px;margin-bottom:4px}
.upload-area .label{font-size:11px;color:var(--muted)}
/* ===== 滚动条 ===== */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* ===== 响应式 ===== */
@media(max-width:768px){
  .sidebar{display:none}
  .fw-lab{flex-direction:column}
  .detail-grid,.confirm-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="fw-lab" id="app">

<!-- ====== 左侧：版本树 ====== -->
<aside class="sidebar">
  <div class="sidebar-header">
    <h1>🔬 Firmware Lab</h1>
    <div class="sub">HW-678A · ESP32-S3 N16R8 · ILI9488</div>
  </div>
  <div class="sidebar-tree" id="treeView">
    <!-- 由 JS 渲染 -->
  </div>
</aside>

<!-- ====== 主区域 ====== -->
<div class="main">
  <!-- 顶栏标签 -->
  <nav class="tabs" id="tabBar">
    <div class="tab active" data-tab="dashboard">📊 总览</div>
    <div class="tab" data-tab="baselines">📌 基线</div>
    <div class="tab" data-tab="experiments">🧪 实验</div>
    <div class="tab" data-tab="issues">🐛 问题库</div>
    <div class="tab" data-tab="flash">⚡ 烧录中心</div>
    <div class="tab" data-tab="reports">📋 测试报告</div>
    <div class="tab" data-tab="knowledge">📖 知识库</div>
  </nav>

  <!-- ====== Dashboard 总览 ====== -->
  <div class="tab-content active" id="tab-dashboard">
    <div class="stat-grid" id="statsGrid"></div>
    <div class="detail-card" style="margin-top:12px">
      <h2>⏱ 最近活动</h2>
      <div id="recentActivity" style="font-size:12px;line-height:1.8"></div>
    </div>
  </div>

  <!-- ====== 基线 ====== -->
  <div class="tab-content" id="tab-baselines">
    <div class="detail-card">
      <h2>📌 已验证基线</h2>
      <div id="baselinesList" style="font-size:13px;line-height:2"></div>
    </div>
    <div class="rollback-area" id="rollbackArea">
      <div style="font-size:12px;margin-bottom:8px;color:var(--muted)">
        🔄 如当前固件不亮，一键回滚到最近基线：
      </div>
      <button class="big-btn" onclick="rollbackLatest()">⏪ 回滚到最新基线</button>
    </div>
  </div>

  <!-- ====== 实验版本 ====== -->
  <div class="tab-content" id="tab-experiments">
    <div class="flex gap-2 mb-3 flex-wrap" id="expFilters">
      <button class="test-action-btn btn-primary" onclick="filterExp('all')" id="ef-all">全部</button>
      <button class="test-action-btn btn-outline" onclick="filterExp('pending')" id="ef-pending">待测试</button>
      <button class="test-action-btn btn-outline" onclick="filterExp('pass')" id="ef-pass">通过</button>
      <button class="test-action-btn btn-outline" onclick="filterExp('fail')" id="ef-fail">失败</button>
    </div>
    <div id="expList"></div>
  </div>

  <!-- ====== 问题库 ====== -->
  <div class="tab-content" id="tab-issues">
    <input class="search-box" id="issueSearch" placeholder="🔍 搜索已解决问题..." oninput="renderIssues()">
    <div id="issuesList"></div>
  </div>

  <!-- ====== 烧录中心 ====== -->
  <div class="tab-content" id="tab-flash">
    <div class="detail-card">
      <h2>⚡ 当前版本烧录</h2>
      <div style="font-size:13px;margin-bottom:8px" id="flashVer">选择左侧版本</div>
      <div class="cmd-box" id="flashCmd"># 请先选择版本</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">
        <button class="test-action-btn btn-primary" onclick="copyCmd('flashCmd')">📋 复制烧录命令</button>
        <button class="test-action-btn btn-outline" onclick="copyCmd('monitorCmd')">📋 复制串口命令</button>
        <a class="test-action-btn btn-primary" style="text-decoration:none" id="downloadBtn" href="#">⬇ 下载 BIN</a>
      </div>
    </div>
    <div class="detail-card">
      <h2>🔄 回滚</h2>
      <div id="rollbackVersions" style="font-size:13px;line-height:2"></div>
    </div>
  </div>

  <!-- ====== 测试报告 ====== -->
  <div class="tab-content" id="tab-reports">
    <div class="test-card">
      <h3>📋 测试任务</h3>
      <div id="testSteps" style="font-size:12px;line-height:1.8"></div>
      <div style="margin-top:10px">
        <div class="confirm-grid" id="confirmGrid">
          <div class="confirm-group">
            <label>是否复现？</label>
            <select id="q-reproduced"><option value="">—</option><option value="yes">✅ 是</option><option value="no">❌ 否</option></select>
          </div>
          <div class="confirm-group">
            <label>新问题？</label>
            <select id="q-new"><option value="">—</option><option value="yes">✅ 是</option><option value="no">❌ 否</option></select>
          </div>
          <div class="confirm-group">
            <label>是否解决原问题？</label>
            <select id="q-solved"><option value="">—</option><option value="yes">✅ 是</option><option value="no">❌ 否</option></select>
          </div>
          <div class="confirm-group">
            <label>需要回滚？</label>
            <select id="q-rollback"><option value="">—</option><option value="yes">✅ 是</option><option value="no">❌ 否</option></select>
          </div>
        </div>
        <div class="upload-area" onclick="document.getElementById('fileUpload').click()">
          <div class="icon">📷</div>
          <div class="label">点击上传串口日志 / 照片 / 视频</div>
          <input type="file" id="fileUpload" multiple accept="image/*,.txt,.log,.csv" style="display:none" onchange="handleUpload(this)">
        </div>
        <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
          <button class="test-action-btn btn-success" onclick="submitTest('pass')">✅ 测试通过</button>
          <button class="test-action-btn btn-danger" onclick="submitTest('fail')">❌ 测试失败</button>
          <button class="test-action-btn btn-outline" onclick="copyReport()">📋 复制测试报告</button>
        </div>
      </div>
    </div>
    <div id="testHistory" style="margin-top:12px"></div>
  </div>

  <!-- ====== 知识库 ====== -->
  <div class="tab-content" id="tab-knowledge">
    <div class="detail-card">
      <h2>📖 已解决问题知识库</h2>
      <div id="knowledgeBase" style="font-size:12px;line-height:1.8"></div>
    </div>
  </div>
</div>

</div>

// =====================================================================
// 构建版本树
// =====================================================================
function buildTreeData() {
  // 按类别分组
  const groups = {
    baseline: [],
    experiment: [],
    legacy: []
  };
  for (const f of FW) {
    if (!groups[f.category]) groups[f.category] = [];
    groups[f.category].push(f);
  }
  return groups;
}

// =====================================================================
// 渲染
// =====================================================================
const BASE = location.hostname === 'licoo12580-source.github.io' 
  ? 'https://raw.githubusercontent.com/licoo12580-source/lingxi-pages/main/firmware'
  : 'firmware';

// 状态颜色
function statusColor(s) {
  const m = {verified:'var(--green)', stable:'var(--green)', pass:'var(--green)',
             pending:'var(--yellow)',
             fail:'var(--red)', test:'var(--orange)',
             deprecated:'var(--muted)'};
  return m[s] || 'var(--muted)';
}
function statusLabel(s) {
  const m = {verified:'🟢 已验证', stable:'🟢 已发布', pass:'✅ 通过',
             pending:'🟡 待测试',
             fail:'❌ 失败', test:'🧪 测试中',
             deprecated:'💤 已废弃'};
  return m[s] || s;
}
function riskLabel(r) {
  const m = {低:'🟢 低',中:'🟠 中',高:'🔴 高'};
  return m[r]||r;
}

function render() {
  renderTree();
  renderDashboard();
  renderBaselines();
  renderExperiments('all');
  renderIssues();
  renderFlash(null);
  renderTestTasks(null);
  renderKnowledge();
  renderTestHistory();
}

// ---- 侧栏版本树 ----
function renderTree() {
  const el = document.getElementById('treeView');
  const groups = buildTreeData();
  let html = '<div class="tree-group"><div class="tree-group-label">📌 基线</div>';
  for (const v of groups.baseline.sort((a,b)=>(b.date||'').localeCompare(a.date||''))) {
    html += `<div class="tree-node" onclick="selectVer('${v.ver}')" data-ver="${v.ver}" style="border-left-color:${statusColor(v.status)}">
      <span class="dot" style="background:${statusColor(v.status)}"></span>
      <span class="ver">${v.tag||v.ver}</span>
      ${v.tag?`<span class="tag" style="background:rgba(59,130,246,.2);color:var(--accent)">${v.tag}</span>`:''}
      <span class="date">${v.date||''}</span>
    </div>`;
  }
  html += '</div><div class="tree-group"><div class="tree-group-label">🧪 实验版本</div>';
  for (const v of groups.experiment.sort((a,b)=>(b.date||'').localeCompare(a.date||''))) {
    html += `<div class="tree-node" onclick="selectVer('${v.ver}')" data-ver="${v.ver}" style="border-left-color:${statusColor(v.status)}">
      <span class="dot" style="background:${statusColor(v.status)}"></span>
      <span class="ver">${v.ver}</span>
      <span class="date">${v.date||''}</span>
    </div>`;
  }
  html += '</div>';
  if (groups.legacy.length) {
    html += '<div class="tree-group"><div class="tree-group-label">📦 早期</div>';
    for (const v of groups.legacy) {
      html += `<div class="tree-node" onclick="selectVer('${v.ver}')" data-ver="${v.ver}" style="border-left-color:${statusColor(v.status)}">
        <span class="ver">${v.ver}</span>
        <span class="date">${v.date||''}</span>
      </div>`;
    }
    html += '</div>';
  }
  el.innerHTML = html;
}

// ---- Dashboard ----
function renderDashboard() {
  const stats = {
    total: FW.length,
    verified: FW.filter(v=>v.status==='verified'||v.status==='stable').length,
    failed: FW.filter(v=>v.status==='fail').length,
    pending: FW.filter(v=>v.status==='pending'||v.status==='test').length,
    issuesSolved: ISSUES_KNOWLEDGE.filter(i=>i.status==='resolved').length,
    issuesUnresolved: ISSUES_KNOWLEDGE.filter(i=>i.status!=='resolved').length
  };
  const recent = [...FW].filter(v=>v.date).sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,5);
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="num" style="color:var(--accent)">${stats.total}</div><div class="label">总版本数</div></div>
    <div class="stat-card"><div class="num" style="color:var(--green)">${stats.verified}</div><div class="label">✅ 已验证</div></div>
    <div class="stat-card"><div class="num" style="color:var(--red)">${stats.failed}</div><div class="label">❌ 失败</div></div>
    <div class="stat-card"><div class="num" style="color:var(--yellow)">${stats.pending}</div><div class="label">🟡 待测试</div></div>
    <div class="stat-card"><div class="num" style="color:var(--green)">${stats.issuesSolved}</div><div class="label">✅ 已解决问题</div></div>
    <div class="stat-card"><div class="num" style="color:var(--yellow)">${stats.issuesUnresolved}</div><div class="label">❓ 未解决问题</div></div>
  `;
  document.getElementById('recentActivity').innerHTML = recent.map(v => 
    `<div><span class="dot" style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${statusColor(v.status)};margin-right:6px;vertical-align:middle"></span> <strong>${v.ver}</strong> <span style="color:var(--muted)">${v.date||''}</span> — ${statusLabel(v.status)}</div>`
  ).join('');
}

// ---- 基线 ----
function renderBaselines() {
  const bl = FW.filter(v=>v.tag && v.status==='verified');
  document.getElementById('baselinesList').innerHTML = bl.length ? bl.map(v => 
    `<div onclick="selectVer('${v.ver}')" style="cursor:pointer;padding:4px 0">⭐ <strong>${v.tag}</strong> = ${v.ver} <span style="color:var(--muted)">${v.desc||''}</span></div>`
  ).join('') : '<div style="color:var(--muted)">暂无已保存基线</div>';
}

// ---- 实验版本 ----
let expFilter = 'all';
function filterExp(f) {
  expFilter = f;
  document.querySelectorAll('#expFilters .test-action-btn').forEach(b => {
    b.className = b.id === 'ef-'+f ? 'test-action-btn btn-primary' : 'test-action-btn btn-outline';
  });
  renderExperiments(f);
}
function renderExperiments(filter) {
  const exps = FW.filter(v => v.category === 'experiment').sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const filtered = filter === 'all' ? exps : exps.filter(v => v.status === filter);
  document.getElementById('expList').innerHTML = filtered.map(v => `
    <div class="test-card" onclick="selectVer('${v.ver}')" style="cursor:pointer">
      <div style="display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap">
        <div><h3>${v.ver}</h3></div>
        <span style="font-size:11px">${statusLabel(v.status)}</span>
      </div>
      ${v.date ? `<div style="font-size:11px;color:var(--muted)">${v.date}</div>` : ''}
      <div style="font-size:11px;color:var(--muted);margin-top:4px">
        ${(v.changes||[]).slice(0,3).map(c=>`<span class="tag" style="background:var(--bg3);color:var(--fg);padding:1px 5px;border-radius:3px;font-size:9px;margin-right:4px">${c}</span>`).join('')}
      </div>
    </div>
  `).join('');
}

// ---- 问题库 ----
function renderIssues() {
  const q = (document.getElementById('issueSearch').value||'').toLowerCase();
  const items = q ? ISSUES_KNOWLEDGE.filter(i => 
    i.title.toLowerCase().includes(q) || i.cause.toLowerCase().includes(q) || i.solution.toLowerCase().includes(q)
  ) : ISSUES_KNOWLEDGE;
  document.getElementById('issuesList').innerHTML = items.map(i => `
    <div class="issue-card">
      <div class="title">
        <span>${i.status==='resolved'?'✅':'❌'}</span>
        ${i.title}
        <span style="font-size:10px;color:var(--muted);margin-left:auto">#${i.id}</span>
      </div>
      <div class="meta">
        <span>🔍 <strong>原因：</strong>${i.cause}</span>
        <span>💊 <strong>解决：</strong>${i.solution}</span>
        <span>📌 <strong>版本：</strong>${i.resolvedIn||'待定'}</span>
      </div>
    </div>
  `).join('');
}

// ---- 烧录中心 ----
function renderFlash(ver) {
  if (!ver) {
    const latest = FW.filter(v=>v.files&&(v.files.merge||v.files.full||v.files.inc)).sort((a,b)=>(b.date||'').localeCompare(a.date||''))[0];
    if (latest) ver = latest;
  }
  if (!ver) return;
  const v = typeof ver === 'string' ? FW.find(f=>f.ver===ver) : ver;
  if (!v) return;
  document.getElementById('flashVer').textContent = `⚡ ${v.ver} (${v.date||'无日期'}) - ${statusLabel(v.status)}`;
  const file = v.files?.merge || v.files?.full || v.files?.inc;
  if (file) {
    document.getElementById('flashCmd').textContent = `esptool --chip esp32s3 write_flash 0x0 ${BASE}/${file}`;
    document.getElementById('downloadBtn').href = `${BASE}/${file}`;
  } else {
    document.getElementById('flashCmd').textContent = '# 该版本无可用 BIN 文件';
    document.getElementById('downloadBtn').href = '#';
  }
  // 回滚列表
  const blVersions = FW.filter(f=>f.status==='verified'||f.status==='stable').sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  document.getElementById('rollbackVersions').innerHTML = blVersions.map(v => 
    `<div onclick="selectVer('${v.ver}')" style="cursor:pointer;padding:2px 0">⏪ 回滚到 <strong>${v.ver}</strong> ${v.tag?`(${v.tag})`:''}</div>`
  ).join('');
}

// ---- 测试任务 ----
function renderTestTasks(ver) {
  v = ver || selectedVer;
  if (!v) return;
  const version = typeof v === 'string' ? FW.find(f=>f.ver===v) : v;
  if (!version) return;
  document.getElementById('testSteps').innerHTML = (version.testSteps||['全擦除','烧录','观察结果']).map((s,i) => 
    `<div class="test-step"><span class="step-num">${i+1}</span>${s}</div>`
  ).join('');
  if (version.expected) {
    document.getElementById('testSteps').innerHTML += `<div class="test-step" style="margin-top:6px;color:var(--green)">🎯 预期：${version.expected}</div>`;
  }
}

// ---- 测试历史 ----
function renderTestHistory() {
  const h = TEST_HISTORY;
  if (!h.length) {
    document.getElementById('testHistory').innerHTML = '<div style="font-size:12px;color:var(--muted)">暂无测试记录。烧录后记录测试结果。</div>';
    return;
  }
  document.getElementById('testHistory').innerHTML = '<h3 style="font-size:13px;margin-bottom:6px">📋 测试历史</h3>' +
    h.slice().reverse().map(r => `<div class="issue-card">
      <div class="title">${r.ver} — ${r.result==='pass'?'✅ 通过':'❌ 失败'}</div>
      <div class="meta">${r.time}${r.note?' · '+r.note:''}</div>
    </div>`).join('');
}

// ---- 知识库 ----
function renderKnowledge() {
  const resolved = ISSUES_KNOWLEDGE.filter(i=>i.status==='resolved');
  document.getElementById('knowledgeBase').innerHTML = resolved.map(i => `
    <div class="issue-card">
      <strong>${i.title}</strong>
      <br><span style="color:var(--muted)">原因：</span>${i.cause}
      <br><span style="color:var(--green)">解决：</span>${i.solution}
      ${i.resolvedIn ? `<br><span style="color:var(--accent)">版本：${i.resolvedIn}</span>` : ''}
    </div>
  `).join('<div style="height:4px"></div>');
}

// =====================================================================
// 交互
// =====================================================================
let selectedVerObj = null;

function selectVer(verId) {
  const v = FW.find(f=>f.ver===verId);
  if (!v) return;
  selectedVer = v;
  selectedVerObj = v;
  
  // 高亮侧栏
  document.querySelectorAll('.tree-node').forEach(n => n.classList.remove('active'));
  const el = document.querySelector(`.tree-node[data-ver="${verId}"]`);
  if (el) el.classList.add('active');
  
  // 渲染详情
  renderFlash(v);
  renderTestTasks(v);
  
  // 切到详情tab
  showTab('flash');
}

function showTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${name}"]`).classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
}

// 标签切换
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => showTab(tab.dataset.tab));
});

// 复制命令
function copyCmd(id) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = '✅ 已复制';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

// 文件上传
function handleUpload(input) {
  testFiles = Array.from(input.files);
  const area = input.parentElement;
  area.innerHTML = `<div class="icon">✅</div><div class="label">已上传 ${testFiles.length} 个文件</div>`;
}

// 提交测试
function submitTest(result) {
  if (!selectedVer) { alert('请先选择版本'); return; }
  const r = {
    ver: selectedVer.ver,
    result: result,
    time: new Date().toLocaleString(),
    note: '',
    files: testFiles.map(f=>f.name),
    feedback: {
      reproduced: document.getElementById('q-reproduced').value,
      new: document.getElementById('q-new').value,
      solved: document.getElementById('q-solved').value,
      rollback: document.getElementById('q-rollback').value
    }
  };
  TEST_HISTORY.push(r);
  renderTestHistory();
  
  // 更新版本状态
  selectedVer.status = result === 'pass' ? 'verified' : 'fail';
  render();
  alert(result === 'pass' ? '✅ 测试通过已记录' : '❌ 测试失败已记录，问题已进入知识库');
}

// 复制测试报告
function copyReport() {
  if (!selectedVer) { alert('请先选择版本'); return; }
  const r = TEST_HISTORY.length ? TEST_HISTORY[TEST_HISTORY.length-1] : {result:'未提交',note:''};
  const report = `### 测试结果
版本：${selectedVer.ver}
结果：${r.result === 'pass' ? '✅ 通过' : r.result === 'fail' ? '❌ 失败' : '未测试'}
现象：${document.getElementById('q-reproduced').value || '未填写'}
串口日志：${r.files?.length ? r.files.join(', ') : '无'}
图片：${r.files?.length ? r.files.join(', ') : '无'}
时间：${new Date().toLocaleString()}`;
  navigator.clipboard.writeText(report).then(() => {
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = '✅ 已复制';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

// 回滚
function rollbackLatest() {
  const bl = FW.filter(v=>v.status==='verified'||v.status==='stable').sort((a,b)=>(b.date||'').localeCompare(a.date||''))[0];
  if (bl) selectVer(bl.ver);
}

// =====================================================================
// 初始化
// =====================================================================
render();
</script>
