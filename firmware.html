*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--card:#1e293b;--border:#334155;--fg:#e2e8f0;--m:#64748b;--accent:#3b82f6;--green:#22c55e;--red:#ef4444;--orange:#f59e0b}
body{background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,sans-serif;padding:16px;max-width:900px;margin:0 auto;font-size:14px}
h1{font-size:20px;margin-bottom:4px;display:flex;align-items:center;gap:8px}

.back{color:var(--accent);text-decoration:none;font-size:13px;display:inline-block;margin-bottom:12px}
.back:hover{text-decoration:underline}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.card h3{font-size:14px;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}

.tag-red{background:#450a0a;color:var(--red)}
.tag-gray{background:var(--border);color:var(--m)}

.firmware-item{border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;transition:all 0.2s}
.firmware-item:hover{border-color:var(--accent);background:rgba(59,130,246,0.03)}
.fw-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:6px}
.fw-name{font-size:15px;font-weight:600}
.fw-status{font-size:11px}
.fw-meta{font-size:12px;color:var(--m);margin-bottom:6px;display:flex;flex-wrap:wrap;gap:4px 12px}
.fw-desc{font-size:13px;color:var(--fg);margin-bottom:8px;line-height:1.5}
.fw-changelog{background:var(--bg);border-radius:6px;padding:8px 12px;font-size:12px;color:var(--m);font-family:monospace;margin-bottom:8px;white-space:pre-wrap;line-height:1.5}
.fw-actions{display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;text-decoration:none;display:inline-block}
.btn-download{background:var(--accent);color:#fff}
.btn-copy{background:transparent;border:1px solid var(--border);color:var(--m)}
.btn-copy:hover{border-color:var(--accent);color:var(--fg)}
.sha-text{font-family:monospace;font-size:11px;color:var(--m);word-break:break-all;background:var(--bg);padding:4px 8px;border-radius:4px;margin-top:4px;display:none}
.sha-text.show{display:block}
/* 审查弹窗 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;width:100%;max-width:800px;max-height:85vh;display:flex;flex-direction:column}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border)}
.modal-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px}
.modal-close{background:none;border:none;color:var(--m);font-size:20px;cursor:pointer;padding:4px}
.modal-close:hover{color:var(--fg)}
.modal-body{flex:1;overflow:auto;padding:0}
.modal-body pre{margin:0;padding:16px;font-family:'JetBrains Mono','Fira Code',monospace;font-size:12px;line-height:1.6;color:var(--fg);white-space:pre-wrap;word-break:break-all}
.modal-footer{display:flex;gap:8px;padding:10px 16px;border-top:1px solid var(--border);justify-content:flex-end}
.modal-footer .btn{font-size:12px}
.modal-loading{text-align:center;padding:40px;color:var(--m);font-size:13px}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.filter-btn{padding:6px 14px;border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:12px;background:transparent;color:var(--m)}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.empty{color:var(--m);text-align:center;padding:24px;font-size:13px}
@media(max-width:640px){.fw-header{flex-direction:column;align-items:start}}

function render() {
  const list = document.getElementById('fw-list');
  const filter = document.querySelector('.filter-btn.active')?.id?.replace('f-', '') || 'all';
  
  let filtered = versions;
  if (filter === 'recommend') filtered = versions.filter(v => v.recommend);
  else if (filter === 'latest') filtered = versions.filter(v => v.status === 'latest');
  else if (filter === 'tested') filtered = versions.filter(v => v.status === 'tested' || v.tested);
  
  list.innerHTML = '';
  for (const v of filtered) {
    const tagsHtml = v.tags.map(t => {
      const color = t.includes('裸') || t.includes('修') ? 'orange' :
                    t === '自检' ? 'blue' :
                    t === '备选' ? 'red' :
                    t === '已验证' || t === '基准' ? 'green' : 'gray';
      return `<span class="tag tag-${color}">${t}</span>`;
    }).join(' ');
    
    const statusHtml = v.recommend ? '<span class="tag tag-green" style="margin-left:6px">推荐</span>' :
                        v.tested ? '<span class="tag tag-green" style="margin-left:6px">已验证</span>' : '';
    
    const dlUrl = `firmware/${v.file}`;
    
    list.innerHTML += `
      <div class="firmware-item" data-ver="${v.ver}">
        <div class="fw-header">
          <div>
            <span class="fw-name">${v.ver}</span>${statusHtml}
            <span style="font-size:12px;color:var(--m);margin-left:8px">${v.date}</span>
          </div>
          <div class="fw-status">${tagsHtml}</div>
        </div>
        <div class="fw-meta">
          <span>📟 ${v.driver}</span>
          <span>📦 ${v.size}</span>
          <span>🔧 ${v.hw}</span>
        </div>
        <div class="fw-desc">${v.desc}</div>
        <div class="fw-changelog">${v.changelog}</div>
        <div class="fw-actions">
          <a class="btn btn-download" href="${dlUrl}" download>⬇️ 下载 ${v.file}</a>
          <button class="btn btn-copy" onclick="toggleSHA('${v.ver}')">🔑 SHA256</button>
          <button class="btn btn-copy" onclick="copyLink('${dlUrl}')">🔗 复制链接</button>
          <button class="btn btn-copy" onclick="openReview('${v.ver}')">📝 查看源码</button>
        </div>
        <div class="sha-text" id="sha-${v.ver}">SHA256: ${v.sha256}</div>
      </div>
    `;
  }
  
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">没有匹配的固件版本</div>';
  }
}

function filterFW(type) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('f-' + type).classList.add('active');
  render();
}

function toggleSHA(ver) {
  const el = document.getElementById('sha-' + ver);
  el.classList.toggle('show');
}

function copyLink(path) {
  const url = window.location.origin + '/' + (window.location.pathname.split('/').filter(p => p).slice(0, -1).join('/') ? '' : 'lingxi-pages/') + path;
  navigator.clipboard.writeText(url).then(() => {
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = '✅ 已复制';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

  const srcUrl = `firmware/${ver}-source.txt`;
  
  fetch(srcUrl)
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(code => {
      document.getElementById('reviewBody').innerHTML = `<pre>${escapeHtml(code)}</pre>`;
    })
    .catch(() => {

      const inoUrl = `firmware/${ver}.ino`;
      return fetch(inoUrl).then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.text();
      }).then(code => {
        document.getElementById('reviewBody').innerHTML = `<pre>${escapeHtml(code)}</pre>`;
      }).catch(() => {
        document.getElementById('reviewBody').innerHTML = `<div class="modal-loading" style="color:var(--red)">
          ❌ 未找到 ${ver} 的源码文件<br>
          <span style="font-size:12px">预期路径: firmware/${ver}-source.txt</span>
        </div>`;
      });
    });
}

function closeReview() {
  document.getElementById('reviewModal').classList.remove('show');
}

function copyReviewCode() {
  const pre = document.querySelector('#reviewBody pre');
  if (!pre) return;
  navigator.clipboard.writeText(pre.textContent).then(() => {
    const btn = document.querySelector('.modal-footer .btn:first-child');
    const orig = btn.textContent;
    btn.textContent = '✅ 已复制';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

render();
</script>
</body>
</html>
