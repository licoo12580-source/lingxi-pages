<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>灵犀 · 空间感知设计展</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080d1a;color:#e2e8f0;font-family:'Noto Sans SC',system-ui,sans-serif}
/* 顶部导航 */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:#080d1acc;backdrop-filter:blur(12px);border-bottom:1px solid #ffffff0a;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between}
.nav-l{display:flex;align-items:center;gap:10px}
.nav-logo{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#22c55e,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff}
.nav-title{font-size:14px;font-weight:600;letter-spacing:1px}
.nav-sub{font-size:10px;color:#475569;margin-left:6px}
.nav-r{display:flex;gap:16px;font-size:11px;color:#64748b}
.nav-r a{cursor:pointer;color:#64748b;text-decoration:none;transition:color .2s}
.nav-r a:hover,.nav-r a.active{color:#22c55e}
/* 英雄区 */
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:80px 48px 48px;position:relative;overflow:hidden}
.hero-bg{position:absolute;top:-50%;left:-50%;right:-50%;bottom:-50%;background:radial-gradient(ellipse 600px 400px at 30% 40%,#22c55e08,transparent 70%),radial-gradient(ellipse 500px 500px at 70% 60%,#8b5cf608,transparent 70%);pointer-events:none}
.hero h1{font-size:48px;font-weight:300;letter-spacing:-1px;line-height:1.2}
.hero h1 span{background:linear-gradient(135deg,#22c55e,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero .sub{font-size:16px;color:#475569;margin-top:16px;max-width:520px;line-height:1.6}
.hero .stats{display:flex;gap:32px;margin-top:40px}
.hero .stats .num{font-size:32px;font-weight:300;color:#e2e8f0}
.hero .stats .lbl{font-size:11px;color:#475569;margin-top:4px}
/* 筛选 */
.filter{position:sticky;top:52px;z-index:99;display:flex;gap:8px;padding:14px 48px;background:#080d1acc;backdrop-filter:blur(8px);border-bottom:1px solid #ffffff0a}
.fltr{padding:6px 16px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid #1e293b;color:#64748b;background:transparent;transition:all .2s}
.fltr:hover{border-color:#334155;color:#94a3b8}
.fltr.active{background:#22c55e11;border-color:#22c55e44;color:#22c55e}
.fltr.sec.active{background:#ef444411;border-color:#ef444444;color:#ef4444}
.fltr.fusion.active{background:#8b5cf611;border-color:#8b5cf644;color:#a78bfa}
/* 作品网格 */
.gallery{padding:24px 48px 80px;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px}
.card{background:linear-gradient(135deg,#0f172a,#111827);border:1px solid #1e293b;border-radius:16px;overflow:hidden;cursor:pointer;transition:all .3s ease}
.card:hover{transform:translateY(-4px);border-color:#334155;box-shadow:0 8px 40px #00000044}
.card .thumb{position:relative;overflow:hidden;height:220px}
.card .thumb .screen{width:100%;height:100%;padding:12px;display:flex;flex-direction:column;position:relative;font-size:6.5px}
.card .thumb .label{position:absolute;top:8px;left:8px;padding:2px 8px;border-radius:4px;font-size:8px;font-weight:600;letter-spacing:0.5px}
.card .meta{padding:12px 14px 14px}
.card .meta .name{font-size:13px;font-weight:600;color:#e2e8f0}
.card .meta .desc{font-size:10px;color:#475569;margin-top:4px;line-height:1.4}
.card .meta .tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.card .meta .tags span{padding:1px 6px;border-radius:3px;font-size:8px;background:#1e293b;color:#64748b}
/* 全屏预览 */
#overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;background:#000000ee;flex-direction:column;align-items:center;justify-content:center;padding:40px}
#overlay .frame{background:#0b1120;border:1px solid #1e293b;border-radius:20px;padding:20px;max-width:500px;width:100%;position:relative}
#overlay .frame .close{position:absolute;top:12px;right:14px;background:transparent;border:none;color:#64748b;font-size:20px;cursor:pointer;transition:color .2s;z-index:10}
#overlay .frame .close:hover{color:#e2e8f0}
#overlay .mobile{aspect-ratio:390/844;background:#0b1120;border-radius:32px;overflow:hidden;position:relative;border:1px solid #1e293b;padding:12px;display:flex;flex-direction:column}
#overlay .mobile .screen{flex:1;display:flex;flex-direction:column;font-size:9px}
#overlay .mobile .slug{font-size:9px;color:#64748b;margin-top:8px;line-height:1.6}
/* 设备模拟 */
.device-frame{aspect-ratio:16/10;max-width:420px;width:100%;background:#0b1120;border-radius:16px;border:1px solid #1e293b;padding:10px;display:flex;flex-direction:column;margin:0 auto;position:relative;overflow:hidden}
/* 动画 */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeIn .4s ease both}
.card:nth-child(1){animation-delay:0s}
.card:nth-child(2){animation-delay:.05s}
.card:nth-child(3){animation-delay:.1s}
.card:nth-child(4){animation-delay:.15s}
</style>
</head>
<body>

<!-- 导航栏 -->
<div class="nav">
  <div class="nav-l">
    <div class="nav-logo">🦞</div>
    <div class="nav-title">灵犀</div>
    <div class="nav-sub">空间感知设计展</div>
  </div>
  <div class="nav-r">
    <a onclick="scrollToEl('gallery')">作品</a>
    <a onclick="scrollToEl('hero')">关于</a>
  </div>
</div>

<!-- 英雄区 -->
<div class="hero" id="hero">
  <div class="hero-bg"></div>
  <h1>空间感知的<br><span>故事呈现</span></h1>
  <div class="sub">节能是空间知道你在不在；安防是空间知道发生什么。<br>真正的产品不是功能堆砌，是每一个屏幕都能独立讲清楚一件事。</div>
  <div class="stats">
    <div><div class="num">24</div><div class="lbl">精品设计</div></div>
    <div><div class="num">2</div><div class="lbl">核心主线</div></div>
    <div><div class="num" style="color:#22c55e">节能</div><div class="lbl">看得见的省电</div></div>
    <div><div class="num" style="color:#ef4444">安防</div><div class="lbl">看得见的安全</div></div>
  </div>
</div>

<!-- 筛选器 -->
<div class="filter" id="filter">
  <div class="fltr active" onclick="filterGallery('all',this)">全部</div>
  <div class="fltr eco" onclick="filterGallery('eco',this)">⚡ 节能</div>
  <div class="fltr sec" onclick="filterGallery('sec',this)">🔒 安防</div>
  <div class="fltr fusion" onclick="filterGallery('fusion',this)">🌌 融合</div>
</div>

<!-- 作品网格 -->
<div class="gallery" id="gallery"></div>

<!-- 全屏预览 -->
<div id="overlay">
  <div class="frame">
    <button class="close" onclick="closeOverlay()">✕</button>
    <div id="overlayBody"></div>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:12px">
      <button onclick="prevDesign()" style="background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:6px 16px;border-radius:8px;cursor:pointer;font-size:10px">◀ 上一个</button>
      <button onclick="nextDesign()" style="background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:6px 16px;border-radius:8px;cursor:pointer;font-size:10px">下一个 ▶</button>
    </div>
  </div>
</div>

<script>
// ===== 设计系统 =====
var DESIGNS = [];

// 构建一个设计对象
function D(name,cat,mockup,story,tags){
  return {name:name,cat:cat,mockup:mockup,story:story,tags:tags||[]};
}

// ---- 节能主线 (14屏) ----
DESIGNS.push(D('能耗时钟 · 深睡节能曲线','eco', function(){
  return '<div style="flex:1;display:flex;flex-direction:column;background:linear-gradient(180deg,#022c22,#064e3b);border-radius:8px;padding:12px"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:10px;font-weight:600;color:#bbf7d0">🌙 昨夜深睡节能</span><span style="font-size:8px;color:#6ee7b7">301房 · 3h12m</span></div><div style="flex:1;display:flex;align-items:flex-end;gap:6px;padding:8px 0"><div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="width:100%;height:18px;background:linear-gradient(to top,#60a5fa,#93c5fd);border-radius:3px 3px 0 0"></div><span style="font-size:7px;color:#94a3b8;margin-top:3px">21时</span></div><div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="width:100%;height:22px;background:linear-gradient(to top,#60a5fa,#93c5fd);border-radius:3px 3px 0 0"></div><span style="font-size:7px;color:#94a3b8;margin-top:3px">22时</span></div><div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="width:100%;height:38px;background:linear-gradient(to top,#22c55e,#4ade80);border-radius:3px 3px 0 0"></div><span style="font-size:7px;color:#94a3b8;margin-top:3px">23时</span></div><div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="width:100%;height:44px;background:linear-gradient(to top,#22c55e,#4ade80);border-radius:3px 3px 0 0"></div><span style="font-size:7px;color:#94a3b8;margin-top:3px">00时</span></div><div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="width:100%;height:42px;background:linear-gradient(to top,#22c55e,#4ade80);border-radius:3px 3px 0 0"></div><span style="font-size:7px;color:#94a3b8;margin-top:3px">01时</span></div><div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="width:100%;height:38px;background:linear-gradient(to top,#22c55e,#4ade80);border-radius:3px 3px 0 0"></div><span style="font-size:7px;color:#94a3b8;margin-top:3px">02时</span></div><div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="width:100%;height:32px;background:linear-gradient(to top,#a78bfa,#c4b5fd);border-radius:3px 3px 0 0"></div><span style="font-size:7px;color:#94a3b8;margin-top:3px">03时</span></div><div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="width:100%;height:26px;background:linear-gradient(to top,#60a5fa,#93c5fd);border-radius:3px 3px 0 0"></div><span style="font-size:7px;color:#94a3b8;margin-top:3px">04时</span></div><div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="width:100%;height:22px;background:linear-gradient(to top,#60a5fa,#93c5fd);border-radius:3px 3px 0 0"></div><span style="font-size:7px;color:#94a3b8;margin-top:3px">05时</span></div><div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="width:100%;height:18px;background:linear-gradient(to top,#60a5fa,#93c5fd);border-radius:3px 3px 0 0"></div><span style="font-size:7px;color:#94a3b8;margin-top:3px">06时</span></div></div><div style="display:flex;justify-content:space-between;font-size:7px;color:#6ee7b7;border-top:1px solid #166534;padding-top:4px"><span>⛰ 深睡段(23-02) +4°C · 省电 1.8 kWh</span><span style="color:#bbf7d0">¥3.15</span></div></div>';
},'空间感知到客人进入深睡 → 自动缓调空调温度。深睡段+4°C，浅睡段+2°C，客人完全无感。一整夜的节能曲线像一座绿色的山丘——睡得越深，省得越多。',['节能','数据可视化','睡眠感知']));

DESIGNS.push(D('WiFi感知 · 出门自动节能','eco', function(){
  return '<div style="flex:1;display:flex;flex-direction:column;background:linear-gradient(180deg,#0c1929,#0f172a);border-radius:8px;padding:12px"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:10px;font-weight:600;color:#e2e8f0">📶 WiFi信号 · 空间决策</span><span style="font-size:8px;color:#64748b">301房 · 实时</span></div><div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:6px;padding:8px 0"><div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:#1e293b66;border-radius:6px;border-left:3px solid #ef4444"><span style="font-size:8px;color:#94a3b8">08:15</span><span style="flex:1;font-size:8px;color:#e2e8f0">WiFi 信号 -72dBm → 判定离开</span><span style="font-size:8px;color:#ef4444">断开</span></div><div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:#1e293b66;border-radius:6px;border-left:3px solid #22c55e"><span style="font-size:8px;color:#94a3b8">08:16</span><span style="flex:1;font-size:8px;color:#e2e8f0">⚡ 温度从 22° 调至 26°C</span><span style="font-size:8px;color:#22c55e">+4°C</span></div><div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:#1e293b66;border-radius:6px;border-left:3px solid #8b5cf6"><span style="font-size:8px;color:#94a3b8">11:05</span><span style="flex:1;font-size:8px;color:#e2e8f0">📱 信号 -38dBm → 客人回来了</span><span style="font-size:8px;color:#8b5cf6">重连</span></div><div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:#1e293b66;border-radius:6px;border-left:3px solid #22c55e"><span style="font-size:8px;color:#94a3b8">11:06</span><span style="flex:1;font-size:8px;color:#e2e8f0">🌡️ 恢复 22°C</span><span style="font-size:8px;color:#22c55e">完成</span></div></div><div style="display:flex;justify-content:space-between;font-size:8px;color:#94a3b8;border-top:1px solid #1e293b;padding-top:4px"><span>外出 2h50m · 省电 0.9kWh</span><span style="color:#22c55e">客人无感 · 自动恢复</span></div></div>';
},'WiFi信号从强到弱→空间判定客人离开→自动节能。信号从弱到强→空间判定客人回来→自动恢复。不需要任何操作，客人甚至不知道空调被调过。',['节能','WiFi感知','自动决策']));

DESIGNS.push(D('外出节能报告 · 完整时间轴','eco', function(){
  return '<div style="flex:1;display:flex;flex-direction:column;background:linear-gradient(180deg,#022c22,#064e3b);border-radius:8px;padding:12px;position:relative;overflow:hidden"><div style="position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;background:#22c55e08"></div><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:10px;font-weight:600;color:#bbf7d0">⛰ 外出节能 · 完整日志</span><span style="font-size:8px;color:#6ee7b7">301房 · 今日</span></div><div style="flex:1;display:flex;flex-direction:column;gap:3px;padding:6px 0;justify-content:center;font-size:7px"><div style="display:flex;gap:6px;padding:3px 6px;background:#00000033;border-radius:4px"><span style="color:#94a3b8;min-width:36px">08:15</span><span style="flex:1;color:#e2e8f0">🔍 雷达检测：无活动</span><span style="color:#64748b">等待确认</span></div><div style="display:flex;gap:6px;padding:3px 6px;background:#00000033;border-radius:4px"><span style="color:#94a3b8;min-width:36px">08:20</span><span style="flex:1;color:#e2e8f0">🌡️ 5分钟无活动 → 确认无人</span><span style="color:#22c55e">✅</span></div><div style="display:flex;gap:6px;padding:3px 6px;background:#22c55e11;border-radius:4px;border-left:2px solid #22c55e"><span style="color:#94a3b8;min-width:36px">08:25</span><span style="flex:1;color:#bbf7d0;font-weight:600">⚡ 进入外出节能</span><span style="color:#22c55e">22°→26°C</span></div><div style="display:flex;gap:6px;padding:3px 6px;background:#f59e0b11;border-radius:4px"><span style="color:#94a3b8;min-width:36px">10:30</span><span style="flex:1;color:#fde68a">🔍 雷达触发（清洁工进房）</span><span style="color:#f59e0b">短暂中断</span></div><div style="display:flex;gap:6px;padding:3px 6px;background:#00000033;border-radius:4px"><span style="color:#94a3b8;min-width:36px">10:35</span><span style="flex:1;color:#e2e8f0">⚡ 恢复节能</span><span style="color:#22c55e">继续</span></div><div style="display:flex;gap:6px;padding:3px 6px;background:#8b5cf611;border-radius:4px;border-left:2px solid #8b5cf6"><span style="color:#94a3b8;min-width:36px">11:05</span><span style="flex:1;color:#c4b5fd;font-weight:600">🔍 雷达检测：客人回来</span><span style="color:#8b5cf6">退出节能</span></div><div style="display:flex;gap:6px;padding:3px 6px;background:#60a5fa11;border-radius:4px"><span style="color:#94a3b8;min-width:36px">11:06</span><span style="flex:1;color:#e2e8f0">🌡️ 温度恢复 22°C</span><span style="color:#60a5fa">完成</span></div></div><div style="display:flex;justify-content:space-between;font-size:7px;color:#6ee7b7;border-top:1px solid #166534;padding-top:4px"><span>⏱ 节能 2h30m · 省电 1.1kWh</span><span style="color:#bbf7d0">含1次清洁中断</span></div></div>';
},'空间完整记录每一次外出节能的前因后果——几点出门、几点确认无人、几点节能、中间有没有被打断（清洁工进来过）、客人几点回来。每一个细节都在日志里。',['节能','时间线','日志']));

DESIGNS.push(D('省电偏移 · 设定vs实际','eco', function(){
  return '<div style="flex:1;display:flex;flex-direction:column;background:linear-gradient(180deg,#0f172a,#1e293b);border-radius:8px;padding:12px"><div style="display:flex;justify-content:space-between"><span style="font-size:10px;font-weight:600;color:#e2e8f0">🎯 省电从哪里来？</span><span style="font-size:8px;color:#64748b">301房 · 今日</span></div><div style="flex:1;display:flex;gap:10px;padding:8px 0"><div style="flex:1;background:#60a5fa08;border:1px solid #60a5fa22;border-radius:8px;padding:10px;display:flex;flex-direction:column"><div style="font-size:7px;color:#60a5fa;letter-spacing:1px;margin-bottom:6px">🎯 客人设定</div><div style="font-size:32px;font-weight:200;color:#60a5fa;text-shadow:0 0 20px #60a5fa22;flex:1;display:flex;align-items:center;justify-content:center">22°C</div><div style="display:flex;flex-direction:column;gap:3px;font-size:7px;color:#94a3b8;border-top:1px solid #60a5fa11;padding-top:6px"><span>入睡偏好 · 轻度</span><span>起床时间 · 07:30</span><span>温度敏感 · 高</span></div></div><div style="flex:1;background:#22c55e08;border:1px solid #22c55e22;border-radius:8px;padding:10px;display:flex;flex-direction:column"><div style="font-size:7px;color:#22c55e;letter-spacing:1px;margin-bottom:6px">⚡ 空间优化</div><div style="font-size:32px;font-weight:200;color:#22c55e;text-shadow:0 0 20px #22c55e22;flex:1;display:flex;align-items:center;justify-content:center">24°C</div><div style="display:flex;flex-direction:column;gap:3px;font-size:7px;color:#94a3b8;border-top:1px solid #22c55e11;padding-top:6px"><span>深睡偏移 · +4°C</span><span>外出偏移 · 无感</span><span>省电/天 · 2.4 kWh</span></div></div></div><div style="display:flex;justify-content:space-between;font-size:8px;color:#94a3b8;border-top:1px solid #1e293b;padding-top:4px"><span>↔ 偏移 +2°C · 年省 ¥1,512</span><span style="color:#22c55e">客人完全无感</span></div></div>';

// ---- 构建页面 ----
var filtered = DESIGNS;
var currentFilter = 'all';
var previewIdx = 0;

function renderAll(){
  var g = document.getElementById('gallery');
  g.innerHTML = '';
  var list = currentFilter==='all' ? DESIGNS : DESIGNS.filter(function(d){return d.cat===currentFilter;});
  list.forEach(function(d,i){
    var c = document.createElement('div');
    c.className = 'card';
    var catLabel = {eco:{name:'节能',color:'#22c55e'},sec:{name:'安防',color:'#ef4444'},fusion:{name:'融合',color:'#8b5cf6'}}[d.cat]||{name:d.cat,color:'#64748b'};
    c.innerHTML = '<div class="thumb"><div class="label" style="background:'+catLabel.color+';color:#000;font-size:8px">'+catLabel.name+'</div><div style="width:100%;height:100%;font-size:7px">'+d.mockup()+'</div></div><div class="meta"><div class="name">'+d.name+'</div><div class="desc">'+(d.story||'').substring(0,80)+(d.story&&d.story.length>80?'...':'')+'</div><div class="tags">'+d.tags.map(function(t){return '<span>'+t+'</span>';}).join('')+'</div></div>';
    c.onclick = function(){previewIdx = DESIGNS.indexOf(d); showPreview();};
    g.appendChild(c);
  });
}

function filterGallery(cat, el){
  currentFilter = cat;
  document.querySelectorAll('.fltr').forEach(function(f){f.classList.remove('active');});
  el.classList.add('active');
  renderAll();
}

function showPreview(){
  var d = DESIGNS[previewIdx];
  if(!d) return;
  var catLabel = {eco:{name:'节能',color:'#22c55e'},sec:{name:'安防',color:'#ef4444'},fusion:{name:'融合',color:'#8b5cf6'}}[d.cat]||{};
  document.getElementById('overlayBody').innerHTML =
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
    '<div style="display:flex;align-items:center;gap:6px"><div style="padding:2px 8px;border-radius:4px;font-size:9px;font-weight:600;background:'+catLabel.color+';color:#000">'+catLabel.name+'</div>'+
    '<span style="font-size:12px;font-weight:600;color:#e2e8f0">'+d.name+'</span></div></div>'+
    '<div class="device-frame">'+d.mockup()+'</div>'+
    '<div class="slug">📖 '+d.story+'</div>'+
    '<div style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap">'+d.tags.map(function(t){return '<span style="padding:2px 6px;border-radius:3px;font-size:8px;background:#1e293b;color:#64748b">#'+t+'</span>';}).join('')+'</div>';
  document.getElementById('overlay').style.display = 'flex';
}

function closeOverlay(){document.getElementById('overlay').style.display='none';}
function prevDesign(){previewIdx = (previewIdx - 1 + DESIGNS.length) % DESIGNS.length; showPreview();}
function nextDesign(){previewIdx = (previewIdx + 1) % DESIGNS.length; showPreview();}
function scrollToEl(id){document.getElementById(id).scrollIntoView({behavior:'smooth'});}
renderAll();
</script>
