<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>灵犀 · IPS触摸屏 UI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
/* 2.8寸设备框 */
.device{background:#000;border-radius:24px;padding:8px;box-shadow:0 0 60px #00000088,0 0 0 1px #1e293b;position:relative}
.screen{width:320px;height:428px;background:#0a0e1a;border-radius:16px;overflow:hidden;position:relative;touch-action:none}
/* 页面容器 */
.page{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;padding:16px 14px}
.page.active{display:flex}
/* 顶栏 */
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding:0 2px;flex-shrink:0}
.top-bar .room{font-size:11px;font-weight:600;color:#e2e8f0}
.top-bar .time{font-size:9px;color:#475569}
.top-bar .wifi{font-size:9px;color:#22c55e}
/* 大数字 - 温度 */
.temp-display{display:flex;align-items:center;justify-content:center;flex:1;gap:4px;position:relative}
.temp-display .temp-num{font-size:64px;font-weight:100;color:#e2e8f0;letter-spacing:-2px;transition:color .3s}
.temp-display .temp-unit{font-size:20px;color:#475569;margin-top:-20px}
.temp-bar{height:3px;background:#1e293b;border-radius:2px;margin:4px 0;position:relative;flex-shrink:0;overflow:hidden}
.temp-bar .fill{height:100%;background:linear-gradient(90deg,#22c55e,#f59e0b,#ef4444);border-radius:2px;transition:width .3s}
.temp-bar .dot{position:absolute;top:-4px;width:3px;height:11px;background:#e2e8f0;border-radius:1px;transition:left .3s}
/* 底部信息行 */
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid #1e293b;flex-shrink:0;margin-top:auto}
.info-item{text-align:center;flex:1;cursor:pointer;padding:4px;border-radius:6px;transition:background .15s}
.info-item:active{background:#1e293b}
.info-item .iv{font-size:16px;font-weight:600}
.info-item .iv.g{color:#22c55e}
.info-item .iv.b{color:#60a5fa}
.info-item .iv.w{color:#f59e0b}
.info-item .il{font-size:7px;color:#475569;margin-top:1px}
/* 调温面板 */
.control-panel{display:none;position:absolute;bottom:0;left:0;right:0;background:#0f172a;border-radius:16px 16px 0 0;padding:16px;border-top:1px solid #1e293b;animation:slideUp .2s ease;z-index:5}
.control-panel.active{display:block}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.cp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cp-header .cp-title{font-size:12px;font-weight:600;color:#e2e8f0}
.cp-header .cp-close{font-size:16px;color:#64748b;cursor:pointer;padding:4px}
.temp-slider-area{display:flex;align-items:center;gap:12px;padding:8px 0}
.temp-slider-area .ts-val{font-size:36px;font-weight:100;min-width:60px;text-align:center;color:#e2e8f0}
.temp-slider-area .ts-unit{font-size:14px;color:#475569}
.slider-wrap{flex:1;height:40px;display:flex;align-items:center;position:relative}
.slider-track{width:100%;height:4px;background:#1e293b;border-radius:2px;position:relative}
.slider-track .slider-fill{height:100%;background:linear-gradient(90deg,#60a5fa,#22c55e);border-radius:2px}
.slider-thumb{position:absolute;top:50%;width:28px;height:28px;background:#e2e8f0;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 2px 8px #00000066;cursor:pointer;touch-action:none}
/* 模式选择 */
.modes{display:flex;gap:6px;margin-top:8px}
.mode{padding:4px 10px;border-radius:12px;font-size:9px;cursor:pointer;flex:1;text-align:center;border:1px solid #334155;color:#64748b;transition:all .15s;background:transparent}
.mode.active{background:#22c55e11;border-color:#22c55e44;color:#22c55e}
/* 节能面板 */
.eco-panel{position:absolute;top:0;left:0;right:0;bottom:0;background:#022c22;display:none;flex-direction:column;padding:16px 14px;z-index:4;animation:fadeIn .2s}
.eco-panel.active{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.eco-panel .eco-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.eco-panel .eco-header .et{font-size:11px;font-weight:600;color:#bbf7d0}
.eco-panel .eco-header .eclose{font-size:16px;color:#6ee7b7;cursor:pointer;padding:4px}
.eco-main{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center}
.eco-main .ebig{font-size:48px;font-weight:100;color:#22c55e}
.eco-main .eunit{font-size:12px;color:#6ee7b7;margin-left:4px}
.eco-main .esub{font-size:9px;color:#6ee7b7;margin-top:2px}
.eco-details{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.eco-details .ed{background:#00000033;border-radius:6px;padding:6px;text-align:center}
.eco-details .ed .edv{font-size:14px;font-weight:600;color:#bbf7d0}
.eco-details .ed .edl{font-size:7px;color:#6ee7b7}
/* 触摸点调试 */
.debug-dot{position:absolute;width:10px;height:10px;background:#ef444488;border-radius:50%;pointer-events:none;z-index:10}
/* 屏保模式 */
.screensaver{position:absolute;top:0;left:0;right:0;bottom:0;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:6}
.screensaver.active{display:flex}
.screensaver .sstime{font-size:56px;font-weight:100;color:#1e293b;letter-spacing:2px}
.screensaver .ssdate{font-size:11px;color:#0f172a;margin-top:4px}
/* 4寸大屏版 */
.size-ctrl{display:flex;gap:6px;margin-top:12px;justify-content:center;flex-shrink:0}
.size-ctrl button{padding:4px 12px;border-radius:6px;font-size:9px;border:1px solid #334155;background:transparent;color:#64748b;cursor:pointer}
.size-ctrl button.active{background:#22c55e11;border-color:#22c55e44;color:#22c55e}
.page-indicator{display:flex;gap:4px;justify-content:center;padding:4px 0;flex-shrink:0}
.page-indicator .pi{width:5px;height:5px;border-radius:50%;background:#1e293b}
.page-indicator .pi.active{background:#22c55e}
</style>
</head>
<body>

<div class="device" id="deviceWrap">
  <div class="screen" id="screen">
    <!-- 主页面：温度 -->
    <div class="page active" id="pageMain">
      <div class="top-bar">
        <span class="room">301 · 陈先生</span>
        <span class="time" id="clockDisplay">00:00</span>
        <span class="wifi">📶 22°C</span>
      </div>
      <div class="temp-display" id="tempDisplay">
        <span class="temp-num" id="tempNum">22</span>
        <span class="temp-unit">°C</span>
      </div>
      <div class="temp-bar">
        <div class="fill" id="tempFill" style="width:40%"></div>
        <div class="dot" id="tempDot" style="left:40%"></div>
      </div>
      <div class="info-row">
        <div class="info-item" onclick="showEco()">
          <div class="iv g">2.4</div>
          <div class="il">今日省电 kWh</div>
        </div>
        <div class="info-item" onclick="openControl()">
          <div class="iv b">22°</div>
          <div class="il">点击调温</div>
        </div>
        <div class="info-item">
          <div class="iv w">1人</div>
          <div class="il">空间感知</div>
        </div>
      </div>
    </div>

    <!-- 节能页 -->
    <div class="eco-panel" id="ecoPanel">
      <div class="eco-header">
        <span class="et">⛰ 今日节能报告</span>
        <span class="eclose" onclick="closeEco()">✕</span>
      </div>
      <div class="eco-main">
        <div><span class="ebig">2.4</span><span class="eunit">kWh</span></div>
        <div class="esub">≈ ¥4.2 · 50间房年省 ¥7.6万</div>
      </div>
      <div class="eco-details">
        <div class="ed"><div class="edv">+4°C</div><div class="edl">外出偏移</div></div>
        <div class="ed"><div class="edv">3h</div><div class="edl">外出时长</div></div>
        <div class="ed"><div class="edv">24°</div><div class="edl">深睡调温</div></div>
        <div class="ed"><div class="edv">6h</div><div class="edl">节能时长</div></div>
      </div>
    </div>

    <!-- 调温面板 -->
    <div class="control-panel" id="controlPanel">
      <div class="cp-header">
        <span class="cp-title">🌡️ 温度设置</span>
        <span class="cp-close" onclick="closeControl()">✕</span>
      </div>
      <div class="temp-slider-area">
        <span class="ts-val" id="sliderVal">22</span><span class="ts-unit">°C</span>
        <div class="slider-wrap" id="sliderWrap">
          <div class="slider-track">
            <div class="slider-fill" id="sliderFill" style="width:34%"></div>
          </div>
          <div class="slider-thumb" id="sliderThumb" style="left:34%"></div>
        </div>
      </div>
      <div class="modes">
        <div class="mode active" onclick="setMode(this,'舒适')">舒适</div>
        <div class="mode" onclick="setMode(this,'节能')">节能</div>
        <div class="mode" onclick="setMode(this,'睡眠')">睡眠</div>
      </div>
    </div>

    <!-- 触摸调试点 -->
    <div class="debug-dot" id="debugDot" style="display:none"></div>
  </div>
  <!-- 尺寸切换 -->
  <div class="size-ctrl">
    <button class="active" onclick="setSize('2.8')">2.8寸</button>
    <button onclick="setSize('4.0')">4.0寸</button>
  </div>
</div>

<script>
// ===== 时钟 =====
function updateClock(){
  var d=new Date(),h=d.getHours().toString().padStart(2,'0'),m=d.getMinutes().toString().padStart(2,'0');
  document.getElementById('clockDisplay').textContent=h+':'+m;
}
setInterval(updateClock,1000);updateClock();

// ===== 温度滑块（触摸拖动） =====
var isDragging=false;
var sliderWrap=document.getElementById('sliderWrap');
var sliderThumb=document.getElementById('sliderThumb');
var sliderFill=document.getElementById('sliderFill');
var sliderVal=document.getElementById('sliderVal');
var tempNum=document.getElementById('tempNum');
var tempFill=document.getElementById('tempFill');
var tempDot=document.getElementById('tempDot');
var tempDisplay=document.getElementById('tempDisplay');

function updateTemp(val){
  val=Math.round(val);
  var pct=(val-16)/(30-16)*100;
  sliderThumb.style.left=pct+'%';
  sliderFill.style.width=pct+'%';
  sliderVal.textContent=val;
  tempNum.textContent=val;
  tempFill.style.width=((val-16)/(30-16)*100)+'%';
  tempDot.style.left=((val-16)/(30-16)*100)+'%';
  if(val<=20){tempNum.style.color='#60a5fa';}
  else if(val<=24){tempNum.style.color='#e2e8f0';}
  else if(val<=27){tempNum.style.color='#f59e0b';}
  else{tempNum.style.color='#ef4444';}
}

function getSliderPos(e){
  var rect=sliderWrap.getBoundingClientRect();
  var x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
  return Math.max(0,Math.min(1,x/rect.width));
}

sliderWrap.addEventListener('touchstart',function(e){isDragging=true;updateTemp(16+getSliderPos(e)*(30-16));e.preventDefault();});
window.addEventListener('touchmove',function(e){if(!isDragging)return;updateTemp(16+getSliderPos(e)*(30-16));e.preventDefault();});
window.addEventListener('touchend',function(){isDragging=false;});
sliderWrap.addEventListener('mousedown',function(e){isDragging=true;updateTemp(16+getSliderPos(e)*(30-16));});
window.addEventListener('mousemove',function(e){if(!isDragging)return;updateTemp(16+getSliderPos(e)*(30-16));});
window.addEventListener('mouseup',function(){isDragging=false;});

// ===== 模式切换 =====
function setMode(el,name){
  document.querySelectorAll('.modes .mode').forEach(function(m){m.classList.remove('active');});
  el.classList.add('active');
  if(name==='舒适')updateTemp(22);
  else if(name==='节能')updateTemp(26);
  else if(name==='睡眠')updateTemp(24);
}

// ===== 面板控制 =====
function openControl(){document.getElementById('controlPanel').classList.add('active');}
function closeControl(){document.getElementById('controlPanel').classList.remove('active');}
function showEco(){document.getElementById('ecoPanel').classList.add('active');}
function closeEco(){document.getElementById('ecoPanel').classList.remove('active');}

// ===== 触摸点跟随（整屏触摸反馈） =====
var dot=document.getElementById('debugDot');
document.getElementById('screen').addEventListener('touchstart',function(e){
  var t=e.touches[0],r=this.getBoundingClientRect();
  dot.style.display='block';dot.style.left=(t.clientX-r.left-5)+'px';dot.style.top=(t.clientY-r.top-5)+'px';
  setTimeout(function(){dot.style.display='none';},300);
});

// ===== 尺寸切换 =====
function setSize(s){
  var scr=document.getElementById('screen'),wrap=document.getElementById('deviceWrap');
  document.querySelectorAll('.size-ctrl button').forEach(function(b){b.classList.remove('active');});
  event.target.classList.add('active');
  if(s==='4.0'){
    scr.style.width='480px';scr.style.height='640px';
  }else{
    scr.style.width='320px';scr.style.height='428px';
  }
}
</script>
</body>
</html>
