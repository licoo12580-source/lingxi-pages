<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>📡 灵犀固件下载 · 版本历史</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--card:#1e293b;--border:#334155;--fg:#e2e8f0;--m:#64748b;--accent:#3b82f6;--green:#22c55e;--red:#ef4444;--orange:#f59e0b;--pink:#ec4899}
body{background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,sans-serif;padding:16px;max-width:1000px;margin:0 auto;font-size:14px}
h1{font-size:22px;margin-bottom:2px;display:flex;align-items:center;gap:8px}
.sub{color:var(--m);font-size:12px;margin-bottom:16px}
.back{color:var(--accent);text-decoration:none;font-size:13px;display:inline-block;margin-bottom:12px}
.back:hover{text-decoration:underline}

/* 版本表头 */
.ver-table{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:13px}
.ver-table th{text-align:left;padding:8px 10px;border-bottom:2px solid var(--border);color:var(--m);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:0.5px}
.ver-table td{padding:10px;border-bottom:1px solid rgba(51,65,85,0.4);vertical-align:top}
.ver-table tr:hover td{background:rgba(59,130,246,0.03)}
.ver-table .ver{font-weight:600;font-size:14px;white-space:nowrap}
.ver-table .date{color:var(--m);font-size:11px;white-space:nowrap}
.ver-table .status{font-size:11px;white-space:nowrap}
.ver-table .desc{font-size:12px;line-height:1.5;max-width:380px}
.ver-table .changes{font-size:11px;color:var(--m);line-height:1.6;font-family:monospace;white-space:pre-wrap;max-width:300px}
.ver-table .actions{white-space:nowrap}

.tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:500;margin-right:3px}
.tag-green{background:#14532d;color:var(--green)}
.tag-blue{background:#1e3a5f;color:var(--accent)}
.tag-red{background:#450a0a;color:var(--red)}
.tag-gray{background:var(--border);color:var(--m)}
.tag-orange{background:#451a03;color:var(--orange)}
.tag-pink{background:#4a0e3b;color:var(--pink)}

.btn{padding:4px 10px;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-weight:500;text-decoration:none;display:inline-block;margin:1px}
.btn-download{background:var(--accent);color:#fff}
.btn-small{background:transparent;border:1px solid var(--border);color:var(--m)}
.btn-small:hover{border-color:var(--accent);color:var(--fg)}

/* 预览图区 */
.preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin:8px 0}
.preview-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px;text-align:center;cursor:pointer;transition:all 0.2s}
.preview-item:hover{border-color:var(--accent)}
.preview-item img{width:100%;border-radius:4px;display:block}
.preview-item .plabel{font-size:10px;color:var(--m);margin-top:4px}

/* 大图弹窗 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;width:100%;max-width:600px;max-height:90vh;display:flex;flex-direction:column}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border)}
.modal-title{font-size:14px;font-weight:600}
.modal-close{background:none;border:none;color:var(--m);font-size:22px;cursor:pointer;padding:2px 8px}
.modal-close:hover{color:var(--fg)}
.modal-body{flex:1;overflow:auto;padding:16px;text-align:center}
.modal-body img{max-width:100%;max-height:70vh;border-radius:8px}
.modal-body .no-preview{color:var(--m);padding:40px;font-size:13px}

/* 审查弹窗 */
.code-modal .modal{max-width:800px}
.code-modal pre{margin:0;padding:16px;font-family:'JetBrains Mono','Fira Code',monospace;font-size:11px;line-height:1.6;white-space:pre-wrap;word-break:break-all}
.code-modal .code-loading{text-align:center;padding:40px;color:var(--m);font-size:13px}

/* 筛选 */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.filter-btn{padding:4px 12px;border:1px solid var(--border);border-radius:16px;cursor:pointer;font-size:11px;background:transparent;color:var(--m)}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* 折叠 */
.collapse{max-height:0;overflow:hidden;transition:max-height 0.3s ease}
.collapse.open{max-height:2000px}

@media(max-width:640px){.ver-table,.ver-table tbody,.ver-table tr,.ver-table td{display:block}.ver-table td{padding:8px 10px}}
</style>
</head>

</div>

function render(verList) {
  const tbody = document.getElementById('fw-body');
  tbody.innerHTML = '';
  for (const f of (verList || FW)) {
    const typeClass = f.type === 'stable' ? 'tag-green' : f.type === 'testing' ? 'tag-orange' : 'tag-gray';
    const typeLabel = f.type === 'stable' ? '已验证' : f.type === 'testing' ? '测试中' : '历史';
    const tagsHtml = (f.tags||[]).map(t => {
      const c = t.includes('中文')?'green':t.includes('触摸')?'blue':t.includes('WDT')?'orange':t.includes('PSRAM')?'pink':'gray';
      return `<span class="tag tag-${c}">${t}</span>`;
    }).join(' ');

    const changesHtml = f.changes ? `<div class="changes">${f.changes}</div>` : '';
    const descHtml = f.desc ? `<span class="desc">${f.desc}</span>` : '';
    
    // 下载按钮
    let actions = '';
    if (f.files.full) actions += `<a class="btn btn-download" href="firmware/${f.files.full}" download>全盘</a> `;
    if (f.files.inc) actions += `<a class="btn btn-download" href="firmware/${f.files.inc}" download>增量</a> `;
    if (f.files.merge) actions += `<a class="btn btn-download" style="background:#8b5cf6" href="firmware/${f.files.merge}" download>合并</a> `;
    if (f.source) actions += `<button class="btn btn-small" onclick="openSource('${f.source}')">源码</button>`;

    tbody.innerHTML += `<tr class="fw-row" data-type="${f.type}">
      <td>
        <div class="ver">${f.ver}</div>
        <div class="date">${f.date}</div>
        <div style="font-size:10px;color:var(--m)">${f.size||''}</div>
      </td>
      <td><span class="tag ${typeClass}">${typeLabel}</span><br>${tagsHtml}</td>
      <td>${descHtml}</td>
      <td>${changesHtml}</td>
      <td class="actions">${actions}</td>
    </tr>`;
  }
}

function filter(type) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('f-' + type).classList.add('active');
  if (type === 'all') render(FW);
  else if (type === 'stable') render(FW.filter(f => f.type === 'stable'));
  else if (type === 'test') render(FW.filter(f => f.type === 'testing' || f.type === 'test'));
  else if (type === 'ui') render(FW.filter(f => f.tags && f.tags.some(t => t.includes('中文'))));
}

// 源码审查弹窗
function openSource(src) {
  const modal = document.getElementById('sourceModal') || (()=>{
    const d = document.createElement('div');
    d.id = 'sourceModal';
    d.className = 'modal-overlay code-modal';
    d.onclick = function(e){if(e.target===this)closeSource()};
    d.innerHTML = `<div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="sourceTitle">源码审查</span>
        <button class="modal-close" onclick="closeSource()">×</button>
      </div>
      <div class="modal-body" id="sourceBody"><div class="code-loading">⏳ 加载中...</div></div>
    </div>`;
    document.body.appendChild(d);
    return d;
  })();
  modal.classList.add('show');
  document.getElementById('sourceTitle').textContent = '📝 ' + src;

  // 尝试几个路径
  const paths = [
    `firmware/${src.split(' ')[0]}-source.txt`,
    `firmware/${src}.txt`,
    `docs/src/${src.split(' ')[0].replace(/^(.+?)\.cpp.*$/,'$1')}.cpp`
  ];
  
  function tryPath(i) {
    if (i >= paths.length) {
      document.getElementById('sourceBody').innerHTML = '<div class="code-loading" style="color:var(--red)">❌ 未找到源码文件</div>';
      return;
    }
    fetch(paths[i]).then(r => r.ok ? r.text() : Promise.reject()).then(code => {
      document.getElementById('sourceBody').innerHTML = `<pre>${code.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>`;
    }).catch(() => tryPath(i+1));
  }
  tryPath(0);
}

function closeSource() {
  const m = document.getElementById('sourceModal');
  if (m) m.classList.remove('show');
}

// 预览
function openPreview(ver) {
  document.getElementById('previewTitle').textContent = ver + ' 预览';
  document.getElementById('previewModal').classList.add('show');
  document.getElementById('previewBody').innerHTML = '<div class="no-preview">暂无预览图<br>请烧录后拍照上传</div>';
}
function closePreview() {
  document.getElementById('previewModal').classList.remove('show');
}

render();
</script>
