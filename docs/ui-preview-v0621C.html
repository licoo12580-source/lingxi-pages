<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', Arial, sans-serif; }
.screen {
  width: 360px; height: 540px;
  background: #0b0e17;
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  position: relative;
  overflow: hidden;
}
/* 状态栏 */
.status-bar { display: flex; justify-content: space-between; margin-bottom: 8px; }
.status-bar span { font-size: 11px; color: #6b7a99; }
.status-bar .online { color: #4caf50; }
/* 标题 */
.title { font-size: 28px; font-weight: 700; color: #2196f3; margin-bottom: 20px; letter-spacing: 4px; }
/* 卡片 */
.card {
  background: #131725; border-radius: 8px; padding: 14px;
  margin-bottom: 10px;
}
.card-lg { height: 64px; }
.card-sm { width: 48%; display: inline-block; height: 72px; padding: 12px; }
.card-sm:nth-child(odd) { margin-right: 4%; }
.card-label { font-size: 11px; color: #6b7a99; margin-bottom: 4px; }
.card-value { font-size: 24px; font-weight: 700; }
.card-value.green { color: #4caf50; }
.card-value.blue { color: #2196f3; }
.card-value.orange { color: #ff9800; }
.card-unit { font-size: 12px; color: #6b7a99; }
/* 行 */
.row { margin-bottom: 10px; }
/* 导航 */
.nav { display: flex; gap: 6px; margin-top: 20px; }
.nav-btn {
  flex: 1; height: 36px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600;
}
.nav-btn.active { background: #2196f3; color: #fff; border: none; }
.nav-btn.inactive { background: transparent; color: #c8d0e0; border: 1px solid #6b7a99; }
/* 底条 */
.bottom-bar { height: 3px; background: #131725; border-radius: 2px; margin: 16px 0 8px; }
.footer { font-size: 10px; color: #6b7a99; }
</style>
</head>
<body>
<div class="screen">
  <div class="status-bar">
    <span>灵犀 · 空间感知</span>
    <span class="online">● 在线</span>
  </div>
  <div class="title">LINGXI</div>

  <!-- 今日省电 大卡片 -->
  <div class="card card-lg">
    <div class="card-label">今日省电</div>
    <div class="card-value green">3.2 kWh</div>
  </div>

  <div class="row">
    <div class="card card-sm">
      <div class="card-label">本月省电</div>
      <div><span class="card-value blue">96.8</span> <span class="card-unit">kWh</span></div>
    </div>
    <div class="card card-sm">
      <div class="card-label">设备在线</div>
      <div><span class="card-value green">3</span> <span class="card-unit">/ 5 台</span></div>
    </div>
  </div>

  <div class="row">
    <div class="card card-sm">
      <div class="card-label">节能中</div>
      <div><span class="card-value orange">2</span> <span class="card-unit">间</span></div>
    </div>
    <div class="card card-sm">
      <div class="card-label">室温</div>
      <div><span class="card-value orange">26°</span></div>
    </div>
  </div>

  <div class="nav">
    <div class="nav-btn active">能耗</div>
    <div class="nav-btn inactive">设备</div>
    <div class="nav-btn inactive">设置</div>
  </div>

  <div class="bottom-bar"></div>
  <div class="footer">v0621C &nbsp;|&nbsp; 空间感知 &nbsp;|&nbsp; 节能优先</div>
</div>
</body>
</html>
