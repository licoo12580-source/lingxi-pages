<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>灵犀 · 空间感知设计系统 v1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b1120;color:#e2e8f0;font-family:system-ui,sans-serif;padding:16px}
h1{font-size:20px;margin-bottom:2px;display:flex;align-items:center;gap:8px}
.sub{color:#64748b;font-size:11px;margin-bottom:12px}
.tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.tab{background:#1e293b;border:1px solid #334155;border-radius:6px;padding:5px 12px;font-size:10px;color:#94a3b8;cursor:pointer;transition:all .15s}
.tab.active{background:#3b82f622;border-color:#3b82f666;color:#60a5fa}
.tab .count{color:#64748b;margin-left:4px;font-size:8px}
.tab:hover{border-color:#3b82f6}
.stats{font-size:9px;color:#64748b;margin-bottom:10px;display:flex;gap:12px}
.stats span{display:flex;align-items:center;gap:3px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.sc-card{background:#1e293b;border:1px solid #334155;border-radius:10px;overflow:hidden;cursor:pointer;transition:all .2s}
.sc-card:hover{transform:translateY(-2px);border-color:#6366f1;box-shadow:0 4px 20px #6366f122}
.sc-card .label{padding:6px 10px;font-size:9px;color:#94a3b8;border-bottom:1px solid #334155;display:flex;justify-content:space-between;align-items:center}
.sc-card .label .tags{display:flex;gap:3px;flex-wrap:wrap}
.sc-card .label .tag{padding:1px 5px;border-radius:3px;font-size:7px;background:#334155;color:#94a3b8}
.sc-card .label .tag.eco{background:#22c55e22;color:#22c55e}
.sc-card .label .tag.sec{background:#ef444422;color:#ef4444}
.sc-card .label .tag.space{background:#8b5cf622;color:#a78bfa}
.sc-card .label .tag.front{background:#f59e0b22;color:#f59e0b}
.sc-card .label .tag.back{background:#60a5fa22;color:#60a5fa}
.sc-card .label .tag.home{background:#ec489922;color:#f472b6}
.sc-card .label .tagid{color:#475569;font-family:monospace;font-size:7px}
.ips{width:100%;aspect-ratio:4/3;padding:6px;display:flex;flex-direction:column;overflow:hidden;position:relative;font-size:7px}
.ips *{font-size:inherit}
</style>
</head>
<body>
<h1>🌌 灵犀 · 空间感知设计系统</h1>
<p class="sub">每种屏都在讲同一个故事："空间知道你在做什么" · 点击全屏预览 · 贴标签记录好设计</p>
<div class="stats"><span>📐 布局模板 10种</span><span>🔖 设计总数 <b id="totalCount">0</b></span><span>📁 覆盖领域 6个</span><span>🏷️ 点击标记喜欢的设计</span></div>
<div class="tabs" id="tabBar"></div>
<div class="grid" id="gallery"></div>

<!-- Preview -->
<div id="preview" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#000000dd;z-index:999;flex-direction:column;align-items:center;justify-content:center;padding:20px">
<div style="background:#0b1120;border:1px solid #334155;border-radius:12px;padding:16px;max-width:420px;width:100%">
<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
<div><div id="pname" style="font-size:14px;font-weight:600"></div>
<div style="display:flex;gap:4px;margin-top:3px" id="ptags"></div>
<div style="font-size:8px;color:#64748b;margin-top:3px;font-family:monospace" id="pid"></div>
</div>
<div style="display:flex;gap:4px">
<button onclick="toggleFavorite()" id="pfavBtn" style="background:transparent;border:1px solid #dc262666;color:#dc2626;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:9px">♡ 标记</button>
<button onclick="closePreview()" style="background:transparent;border:none;color:#64748b;font-size:18px;cursor:pointer">✕</button>
</div>
</div>
<div id="pbody" style="margin-bottom:6px"></div>
<div id="pdata" style="font-size:8px;color:#64748b;margin-bottom:8px;padding:6px;background:#1e293b;border-radius:6px"></div>
<div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:center">
<label style="font-size:8px;color:#94a3b8;cursor:pointer;background:#1e293b;padding:3px 8px;border-radius:4px;display:flex;align-items:center;gap:3px"><input type="radio" name="pmode" value="日间" checked onchange="showPreview()"> ☀️</label>
<label style="font-size:8px;color:#94a3b8;cursor:pointer;background:#1e293b;padding:3px 8px;border-radius:4px;display:flex;align-items:center;gap:3px"><input type="radio" name="pmode" value="夜间" onchange="showPreview()"> 🌙</label>
<label style="font-size:8px;color:#94a3b8;cursor:pointer;background:#1e293b;padding:3px 8px;border-radius:4px;display:flex;align-items:center;gap:3px"><input type="radio" name="pmode" value="高峰" onchange="showPreview()"> 🔥</label>
<label style="font-size:8px;color:#94a3b8;cursor:pointer;background:#1e293b;padding:3px 8px;border-radius:4px;display:flex;align-items:center;gap:3px"><input type="radio" name="pmode" value="屏保" onchange="showPreview()"> 💤</label>
</div>
<div style="display:flex;gap:8px;justify-content:center;margin-top:6px">
<button onclick="prevDesign()" style="background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:9px">◀ 上一</button>
<button onclick="nextDesign()" style="background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:9px">下一 ▶</button>
</div>
</div>
</div>

<script>
// ===================================================================
// 设计系统引擎 — 10种核心布局模板 + 200+参数化设计
// ===================================================================

// ----- 工具函数 -----
function rand(n,m){return Math.floor(Math.random()*(m-n+1))+n}
function pick(arr){return arr[rand(0,arr.length-1)]}
function clamp(v,min,max){return Math.max(min,Math.min(max,v))}

// ----- 颜色系统 -----
var C = {
  eco: {bg:'#064e3b',accent:'#22c55e',accent2:'#4ade80',dim:'#166534',text:'#bbf7d0'},
  sec: {bg:'#1a0a0a',accent:'#ef4444',accent2:'#f87171',dim:'#450a0a',text:'#fca5a5'},
  space: {bg:'#1e1b4b',accent:'#8b5cf6',accent2:'#a78bfa',dim:'#2e1b5b',text:'#c4b5fd'},
  front: {bg:'#1a2a0a',accent:'#f59e0b',accent2:'#fbbf24',dim:'#2a1a0a',text:'#fde68a'},
  back: {bg:'#0a1a2a',accent:'#60a5fa',accent2:'#93c5fd',dim:'#0a1a3a',text:'#bfdbfe'},
  home: {bg:'#2a0a1a',accent:'#ec4899',accent2:'#f472b6',dim:'#3a0a2a',text:'#fbcfe8'}
};
var catColors = {eco:C.eco,sec:C.sec,space:C.space,front:C.front,back:C.back,home:C.home};

// ----- 布局模板 (10种) -----
// 每种模板是一个函数: (design, mode, big) => HTML string
// design = {name, cat, data, story, ...}
// mode = '日间'|'夜间'|'高峰'|'屏保'
// big = true 预览模式

var layouts = {};

// T1: 卡片瀑布 — 多卡片不等高
layouts.masonry = function(d,m,big){
  if(m==='屏保') return ecoScreen(d);
  var sz = big?'14px':'10px'; var h = big?'':'7px';
  var n = d.data.metrics || [{v:'26°',l:'温度',c:'cool'},{v:'42dB',l:'噪音',c:''},{v:'58%',l:'湿度',c:''}];
  var mc = d.data.mainCard;
  return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px;flex:1;font-size:'+h+'">'+
    '<div style="grid-column:1/-1;background:#00000044;border-radius:5px;padding:5px;display:flex;align-items:center;justify-content:space-between">'+
    '<div><div style="font-size:'+sz+';font-weight:700;color:'+(d.cat==='eco'?C.eco.accent:C.sec.accent)+'">'+(mc?mc.v:'')+'</div>'+
    '<div style="font-size:6px;color:#64748b">'+(mc?mc.l:'')+'</div></div>'+
    '<div style="font-size:7px;color:#94a3b8;text-align:right;line-height:1.3">'+(mc?mc.sub:'')+'</div></div>'+
    n.map(function(x){return '<div style="background:#1e293b;border-radius:4px;padding:4px;display:flex;flex-direction:column;justify-content:center"><div style="font-size:'+(big?'12px':'8px')+';font-weight:600;color:'+(x.c==='good'?C.eco.accent:x.c==='warn'?C.sec.accent:x.c==='cool'?'#60a5fa':x.c==='warm'?'#f59e0b':'#e2e8f0')+'">'+x.v+'</div><div style="font-size:6px;color:#64748b">'+x.l+'</div></div>';}).join('')+
  '</div><div style="display:flex;gap:4px;font-size:5px;color:#64748b;margin-top:2px;justify-content:space-between"><span>'+(d.data.footer||'')+'</span><span>'+(d.data.footer2||'')+'</span></div>';
};

// T2: 时间线 — 事件流
layouts.timeline = function(d,m,big){
  if(m==='屏保') return ecoScreen(d);
  var ev = d.data.events||[{t:'08:00',txt:'事件1',c:''}];
  var sz = big?'1':'';
  return '<div style="display:flex;justify-content:space-between;font-size:6px;color:#64748b;margin-bottom:3px"><span>'+(d.data.header||'')+'</span><span>'+(d.data.subhead||'')+'</span></div>'+
    '<div style="flex:1;display:flex;flex-direction:column;gap:2px;overflow:hidden">'+
    ev.map(function(e){return '<div style="display:flex;align-items:center;gap:3px;padding:2px 4px;background:#1e293b;border-radius:3px;font-size:'+(big?'8px':'6px')+';border-left:2px solid '+(e.c||catColors[d.cat].accent)+'"><span style="color:#94a3b8;font-family:monospace;min-width:24px;font-size:'+(big?'7px':'5px')+'">'+e.t+'</span><span style="flex:1;color:#e2e8f0">'+e.txt+'</span>'+(e.v?'<span style="color:#64748b;font-size:5px">'+e.v+'</span>':'')+'</div>';}).join('')+
  '</div><div style="display:flex;gap:4px;font-size:5px;color:#64748b;margin-top:2px;justify-content:space-between"><span>'+(d.data.footer||'')+'</span><span>'+(d.data.footer2||'')+'</span></div>';
};

// T3: 环形/仪表 — 圆形可视化
layouts.gauge = function(d,m,big){
  if(m==='屏保') return ecoScreen(d);
  var sz = big?'14px':'10px';
  var g = d.data.gauges||[{v:75,l:'指标'}];
  var c = catColors[d.cat];
  return '<div style="flex:1;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:3px;position:relative">'+
    g.map(function(g2,i){return '<svg viewBox="0 0 60 50" style="width:55px;height:45px"><path d="M5,45 A25,25 0 0,1 55,45" stroke="#1e293b" stroke-width="5" fill="none"/><path d="M5,45 A25,25 0 0,1 55,45" stroke="'+(g2.c||c.accent)+'" stroke-dasharray="78.5" stroke-dashoffset="'+(78.5-g2.v/100*78.5)+'" stroke-width="5" fill="none"/><text x="30" y="42" text-anchor="middle" font-size="'+(big?'9px':'7px')+'" font-weight="600" fill="'+(g2.c||c.accent)+'">'+g2.v+(g2.u||'')+'</text><text x="30" y="48" text-anchor="middle" font-size="'+(big?'6px':'4px')+'" fill="#64748b">'+g2.l+'</text></svg>';}).join('')+
    (d.data.center?('<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center"><div style="font-size:'+(big?'16px':'12px')+';font-weight:700;color:'+c.accent+'">'+d.data.center.v+'</div><div style="font-size:6px;color:#64748b">'+d.data.center.l+'</div></div>'):'')+
  '</div><div style="display:flex;gap:4px;font-size:5px;color:#64748b;margin-top:2px;justify-content:space-between"><span>'+(d.data.footer||'')+'</span><span>'+(d.data.footer2||'')+'</span></div>';
};

// T4: 双屏对比
layouts.split = function(d,m,big){
  if(m==='屏保') return ecoScreen(d);
  var c = catColors[d.cat];
  var l = d.data.left||{title:'左',items:[]};
  var r = d.data.right||{title:'右',items:[]};
  return '<div style="flex:1;display:grid;grid-template-columns:1fr 1fr;gap:3px">'+
    '<div style="background:'+c.accent+'11;border:1px solid '+c.accent+'33;border-radius:5px;padding:4px;display:flex;flex-direction:column;gap:2px"><div style="font-size:6px;color:'+c.accent+';text-align:center;letter-spacing:1px;text-transform:uppercase">'+l.title+'</div>'+
    (l.big?'<div style="font-size:'+(big?'18px':'14px')+';font-weight:700;color:'+c.accent+';flex:1;display:flex;align-items:center;justify-content:center">'+l.big+'</div>':'')+
    (l.items?l.items.map(function(x){return '<div style="display:flex;justify-content:space-between;font-size:'+(big?'7px':'5px')+';padding:1px 3px;background:#00000022;border-radius:2px"><span>'+x.l+'</span><span style="font-weight:600">'+x.v+'</span></div>';}).join(''):'')+
    '</div>'+
    '<div style="background:'+C.space.accent+'11;border:1px solid '+C.space.accent+'33;border-radius:5px;padding:4px;display:flex;flex-direction:column;gap:2px"><div style="font-size:6px;color:'+C.space.accent+';text-align:center;letter-spacing:1px;text-transform:uppercase">'+r.title+'</div>'+
    (r.big?'<div style="font-size:'+(big?'18px':'14px')+';font-weight:700;color:'+C.space.accent+';flex:1;display:flex;align-items:center;justify-content:center">'+r.big+'</div>':'')+
    (r.items?r.items.map(function(x){return '<div style="display:flex;justify-content:space-between;font-size:'+(big?'7px':'5px')+';padding:1px 3px;background:#00000022;border-radius:2px"><span>'+x.l+'</span><span style="font-weight:600">'+x.v+'</span></div>';}).join(''):'')+
    '</div>'+
  '</div><div style="display:flex;gap:4px;font-size:5px;color:#64748b;margin-top:2px;justify-content:space-between"><span>'+(d.data.footer||'')+'</span><span>'+(d.data.footer2||'')+'</span></div>';
};

// T5: 雷达图 — 多维能力
layouts.radar = function(d,m,big){
  if(m==='屏保') return ecoScreen(d);
  var c = catColors[d.cat];
  var dims = d.data.dims||[{l:'维度1',v:80}];
  var angles = dims.map(function(_,i){return 2*Math.PI*i/dims.length - Math.PI/2;});
  var cx = 50, cy = 50, r = 35;
  var path = angles.map(function(a,i){var x=cx+r*dims[i].v/100*Math.cos(a),y=cy+r*dims[i].v/100*Math.sin(a);return (i===0?'M':'L')+x.toFixed(1)+','+y.toFixed(1);}).join('')+'Z';
  return '<div style="flex:1;display:flex;align-items:center;justify-content:center;position:relative">'+
    '<svg viewBox="0 0 100 100" style="width:'+(big?'120px':'80px')+';height:'+(big?'120px':'80px')+'"><polygon points="'+[1,2,3,4,5].map(function(l){var lr=r*l/5;return angles.map(function(a){return (cx+lr*Math.cos(a)).toFixed(1)+','+(cy+lr*Math.sin(a)).toFixed(1);}).join(' ');}).join(' ')+'" fill="none" stroke="#1e293b" stroke-width="0.5"/>'+
    dims.map(function(d2,i){var a=angles[i];return '<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+r*Math.cos(a)).toFixed(1)+'" y2="'+(cy+r*Math.sin(a)).toFixed(1)+'" stroke="#1e293b" stroke-width="0.3"/>';}).join('')+
    '<path d="'+path+'" fill="'+c.accent+'33" stroke="'+c.accent+'" stroke-width="1"/>'+
    dims.map(function(d2,i){var a=angles[i];var lx=cx+(r+12)*Math.cos(a),ly=cy+(r+12)*Math.sin(a);return '<text x="'+lx+'" y="'+ly+'" text-anchor="middle" dominant-baseline="middle" font-size="4" fill="#94a3b8">'+d2.l+'</text>';}).join('')+
    '</svg>'+
    (d.data.center?'<div style="position:absolute;text-align:center"><div style="font-size:'+(big?'14px':'10px')+';font-weight:700;color:'+c.accent+'">'+d.data.center.v+'</div><div style="font-size:5px;color:#64748b">'+d.data.center.l+'</div></div>':'')+
  '</div><div style="display:flex;gap:4px;font-size:5px;color:#64748b;margin-top:2px;justify-content:space-between"><span>'+(d.data.footer||'')+'</span><span>'+(d.data.footer2||'')+'</span></div>';
};

// T6: 信息流 — 滚动通知
layouts.feed = function(d,m,big){
  if(m==='屏保') return ecoScreen(d);
  var c = catColors[d.cat];
  var feeds = d.data.feeds||[{icon:'ℹ️',txt:'消息'}];
  return '<div style="display:flex;justify-content:space-between;font-size:6px;color:#64748b;margin-bottom:2px"><span>'+(d.data.header||'')+'</span><span>'+(d.data.subhead||'')+'</span></div>'+
    '<div style="flex:1;display:flex;flex-direction:column;gap:2px;overflow:hidden">'+
    feeds.map(function(f,i){return '<div style="display:flex;align-items:center;gap:3px;padding:2px 4px;background:#1e293b;border-radius:3px;font-size:'+(big?'7px':'5px')+';border-left:2px solid '+(f.c||c.accent)+'"><span style="font-size:7px">'+f.icon+'</span><span style="flex:1;color:#e2e8f0">'+f.txt+'</span>'+(f.v?'<span style="color:'+(f.vc||'#64748b')+';font-weight:600;font-size:5px">'+f.v+'</span>':'')+'</div>';}).join('')+
  '</div><div style="display:flex;gap:4px;font-size:5px;color:#64748b;margin-top:2px;justify-content:space-between"><span>'+(d.data.footer||'')+'</span><span>'+(d.data.footer2||'')+'</span></div>';
};

// T7: 矩阵/网格
layouts.matrix = function(d,m,big){
  if(m==='屏保') return ecoScreen(d);
  var c = catColors[d.cat];
  var cells = d.data.cells||[{v:'--',l:'',s:'empty'}];
  var cols = d.data.cols||5;
  return '<div style="display:flex;justify-content:space-between;font-size:6px;color:#64748b;margin-bottom:2px"><span>'+(d.data.header||'')+'</span><span>'+(d.data.subhead||'')+'</span></div>'+
    '<div style="flex:1;display:grid;grid-template-columns:repeat('+cols+',1fr);gap:2px;align-content:start">'+
    cells.map(function(c2){return '<div style="aspect-ratio:1;border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:'+
      (c2.s==='occ'?c.accent+'22':c2.s==='alert'?C.sec.accent+'22':c2.s==='eco'?C.eco.accent+'22':c2.s==='clean'?C.eco.accent+'22':'#1e293b')+
      ';border:1px solid '+(c2.s==='occ'?c.accent+'44':c2.s==='alert'?C.sec.accent+'44':c2.s==='eco'?C.eco.accent+'44':c2.s==='clean'?C.eco.accent+'44':'#334155')+
      ';font-size:'+(big?'9px':'6px')+';font-weight:600;color:'+(c2.s==='occ'?c.accent:c2.s==='alert'?C.sec.accent:C.eco.accent)+'"><div>'+(c2.v||'')+'</div>'+(c2.l?'<div style="font-size:4px;color:#475569;margin-top:1px">'+c2.l+'</div>':'')+'</div>';}).join('')+
  '</div><div style="display:flex;gap:4px;font-size:5px;color:#64748b;margin-top:2px;justify-content:space-between"><span>'+(d.data.footer||'')+'</span><span>'+(d.data.footer2||'')+'</span></div>';
};

// T8: HUD全息
layouts.hud = function(d,m,big){
  if(m==='屏保') return ecoScreen(d);
  var c = catColors[d.cat];
  var sz = big?'12px':'8px';
  var main = d.data.main||{v:'--',l:'',sub:[]};
  return '<div style="flex:1;display:flex;flex-direction:column;position:relative">'+
    '<div style="display:flex;justify-content:space-between;font-size:5px;color:'+c.accent+'44;margin-bottom:auto">'+
    '<span>'+(d.data.header||'')+'</span><span>'+(d.data.subhead||'')+'</span></div>'+
    '<div style="display:flex;flex:1;gap:3px;align-items:center"><div style="flex:1"><div style="font-size:'+(big?'18px':'14px')+';font-weight:300;text-shadow:"0 0 15px '+c.accent+'44";color:'+c.accent+'">'+main.v+'</div><div style="font-size:6px;color:'+c.accent+'44;text-transform:uppercase;letter-spacing:1px">'+main.l+'</div></div>'+
    (main.sub?('<div style="width:'+(big?'50%':'40%')+';display:grid;grid-template-columns:1fr 1fr;gap:2px">'+main.sub.map(function(s){return '<div style="background:'+c.accent+'08;border:1px solid '+c.accent+'22;border-radius:3px;padding:3px;text-align:center"><div style="font-size:'+(big?'8px':'6px')+';font-weight:600;color:#94a3b8">'+s.v+'</div><div style="font-size:'+(big?'5px':'3px')+';color:'+c.accent+'44">'+s.l+'</div></div>';}).join('')+'</div>'):'')+
    '</div><div style="font-size:4px;color:'+c.accent+'44;display:flex;gap:3px;margin-top:auto"><span>'+(d.data.footer||'')+'</span><span>'+(d.data.footer2||'')+'</span></div></div>';
};

// T9: 图表柱状
layouts.chart = function(d,m,big){
  if(m==='屏保') return ecoScreen(d);
  var c = catColors[d.cat];
  var bars = d.data.bars||[{l:'A',v:50}];
  var maxV = Math.max.apply(null,bars.map(function(b){return b.v;}));
  return '<div style="display:flex;justify-content:space-between;font-size:6px;color:#64748b;margin-bottom:2px"><span>'+(d.data.header||'')+'</span><span>'+(d.data.subhead||'')+'</span></div>'+
    '<div style="flex:1;display:flex;align-items:flex-end;gap:4px;padding:'+(big?'0 8px':'0 4px')+'">'+
    bars.map(function(b,i){var pct = b.v/maxV*100; return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;height:100%"><div style="flex:1;width:100%;display:flex;flex-direction:column;justify-content:flex-end"><div style="width:'+(big?'70%':'60%')+';margin:0 auto;border-radius:3px 3px 0 0;height:'+pct+'%;background:'+(b.c||c.accent)+'55;border:1px solid '+(b.c||c.accent)+'"></div></div><div style="font-size:'+(big?'8px':'6px')+';font-weight:600;margin-top:3px;color:'+(b.c||c.accent)+'">'+b.v+'</div><div style="font-size:'+(big?'5px':'4px')+';color:#64748b">'+b.l+'</div></div>';}).join('')+
  '</div><div style="display:flex;gap:4px;font-size:5px;color:#64748b;margin-top:2px;justify-content:space-between"><span>'+(d.data.footer||'')+'</span><span>'+(d.data.footer2||'')+'</span></div>';
};

// T10: 大数全屏
layouts.hero = function(d,m,big){
  if(m==='屏保') return ecoScreen(d);
  var c = catColors[d.cat];
  var h = d.data.hero||{v:'--',l:'',sub:''};
  return '<div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative">'+
    '<div style="font-size:'+(big?'24px':'18px')+';font-weight:100;color:'+c.accent+';text-shadow:0 0 20px '+c.accent+'44">'+h.v+'</div>'+
    '<div style="font-size:'+(big?'8px':'6px')+';color:#64748b;margin-top:3px;text-transform:uppercase;letter-spacing:2px">'+h.l+'</div>'+
    (h.sub?'<div style="font-size:6px;color:#475569;margin-top:5px;display:flex;gap:8px">'+h.sub.map(function(s){return '<span>'+s+'</span>';}).join('')+'</div>':'')+
    '<div style="position:absolute;bottom:4px;left:6px;right:6px;display:flex;justify-content:space-between;font-size:5px;color:#334155"><span>'+(d.data.footer||'')+'</span><span>'+(d.data.footer2||'')+'</span></div></div>';
};

function renderDesign(d, mode, big) {
  var tpl = layouts[d.tpl] || layouts.masonry;
  // Ensure data has all fields
  if(!d.data) d.data = {};
  d.data.footer = d.data.footer || '';
  d.data.footer2 = d.data.footer2 || '';
  return tpl(d, mode, big);
}

var currentCat = 'all';
var currentIdx = 0;
var favorites = {};

function buildGallery() {
  var filtered = designs;
  if(currentCat !== 'all') filtered = designs.filter(function(d){ return d.cat === currentCat; });
  document.getElementById('totalCount').textContent = filtered.length;

  var container = document.getElementById('gallery');
  container.innerHTML = '';
  filtered.forEach(function(d, i){
    var card = document.createElement('div');
    card.className = 'sc-card';
    var c = catColors[d.cat] || catColors.eco;
    var catName = {eco:'节能',sec:'安防',space:'感知',front:'前台',back:'后台',home:'家居'}[d.cat]||d.cat;
    card.innerHTML = '<div class="label"><span style="color:'+c.accent+'">'+d.name+'</span><div class="tags">'+
      '<span class="tag '+d.cat+'">'+catName+'</span>'+
      '<span class="tag">'+d.tpl+'</span>'+
      (favorites[d.name]?'<span class="tag" style="background:#dc262622;color:#dc2626">★</span>':'')+
      '</div></div><div class="ips" style="background:'+c.bg+'">'+renderDesign(d,'日间')+'</div>'+
      '<div style="padding:3px 6px 4px;font-size:6px;color:#475569;border-top:1px solid #334155;display:flex;justify-content:space-between"><span>'+(d.story||'').substring(0,30)+(d.story&&d.story.length>30?'...':'')+'</span><span style="color:#334155;font-family:monospace">#'+(i+1)+'</span></div>';

}

function switchTab(cat) {
  currentCat = cat;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelector('.tab[data-cat="'+cat+'"]').classList.add('active');
  buildGallery();
}

  document.getElementById('pfavBtn').textContent = favorites[d.name] ? '❤️ 已标记' : '♡ 标记喜欢';
  var mode = document.querySelector('input[name="pmode"]:checked') ? document.querySelector('input[name="pmode"]:checked').value : '日间';
  document.getElementById('pbody').innerHTML = '<div class="ips" style="aspect-ratio:4/3;max-width:380px;margin:0 auto;background:'+c.bg+';font-size:'+(true?'10px':'7px')+'">'+
    renderDesign(d, mode, true)+'</div>';
  document.getElementById('pdata').textContent = '📖 空间感知故事: '+(d.story||'');
  document.getElementById('preview').style.display = 'flex';
  currentPreviewIdx = currentIdx;
}

function closePreview(){document.getElementById('preview').style.display='none';}

function prevDesign(){
  currentIdx = (currentIdx - 1 + designs.length) % designs.length;
  showPreview();
}

function nextDesign(){
  currentIdx = (currentIdx + 1) % designs.length;
  showPreview();
}

function toggleFavorite(){
  var d = designs[currentIdx];
  if(!d) return;
  if(favorites[d.name]) delete favorites[d.name];
  else favorites[d.name] = true;
  showPreview();
  buildGallery();
}

// Init
buildTabs();
buildGallery();
</script>
</body>
</html>
