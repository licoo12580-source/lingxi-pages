[env:esp32-s3-devkitc-1]
platform = espressif32
board = freenove_esp32_s3_wroom
framework = arduino
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = dio
board_build.flash_freq = 40m
board_build.partitions = partitions_industrial.csv
board_build.flash_size = 16MB
board_build.psram = enable
board_build.psram_mode = opi
board_upload.flash_size = 16MB
board_build.usb_cdc_enabled = yes
board_build.usb_mode = 1
board_build.cdc_filter = 1
monitor_speed = 115200
build_flags = 
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=5
board_build.arduino_stack_size = 16384
lib_deps = 
    olikraus/U8g2 @ ^2.34.12
    adafruit/DHT sensor library @ ^1.4.4
    crankyoldgit/IRremoteESP8266 @ ^2.8.8
    bodmer/TFT_eSPI @ ^2.5.43

[env:test-all]
platform = espressif32
board = freenove_esp32_s3_wroom
framework = arduino
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = dio
board_build.flash_freq = 40m
board_build.partitions = partitions_industrial.csv
board_build.flash_size = 16MB
board_build.psram = disable
board_upload.flash_size = 16MB
board_build.usb_cdc_enabled = yes
board_build.usb_mode = 0
board_build.cdc_filter = 1
board_build.arduino_stack_size = 16384
monitor_speed = 115200
build_flags = 
    -DCORE_DEBUG_LEVEL=5
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCONFIG_SPIRAM=n
    -DUSE_HSPI_PORT
src_filter = +<*> -<main.cpp>
lib_deps = 
    bodmer/TFT_eSPI @ ^2.5.43
    adafruit/Adafruit NeoPixel @ ^1.12.0
