<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🦞 IPS屏幕设计集 v2 · 12种数据架构</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b1120;color:#e2e8f0;font-family:system-ui,sans-serif;padding:16px}
h1{font-size:18px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.sub{color:#64748b;font-size:11px;margin-bottom:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.sc-card{background:#1e293b;border:1px solid #334155;border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s}
.sc-card:hover{transform:translateY(-2px);border-color:#3b82f6;box-shadow:0 4px 20px #3b82f622}
.sc-card .label{padding:7px 12px;font-size:10px;color:#94a3b8;border-bottom:1px solid #334155;display:flex;justify-content:space-between}
.sc-card .label .tag{padding:1px 6px;border-radius:3px;font-size:8px}
.ips{width:100%;aspect-ratio:4/3;padding:8px;display:flex;flex-direction:column;overflow:hidden}
/* ===== S1: 卡片瀑布 ===== */
.s1{background:#0f172a}.s1 .masonry{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto;gap:4px;flex:1}.s1 .mc{background:#1e293b;border-radius:6px;padding:6px;display:flex;flex-direction:column;justify-content:center}.s1 .mc.large{grid-column:1/-1;flex-direction:row;align-items:center;gap:8px}.s1 .mc .mv{font-size:20px;font-weight:700}.s1 .mc .mv.g{color:#22c55e}.s1 .mc .mv.b{color:#60a5fa}.s1 .mc .ml{font-size:7px;color:#64748b}.s1 .mc .pms-tag{font-size:7px;padding:1px 5px;border-radius:3px;background:#22c55e22;color:#22c55e}.s1 .sig{font-size:6px;color:#64748b;display:flex;gap:6px;margin-top:3px}
/* ===== S2: 仪表集群 ===== */
.s2{background:#0a0e1a;position:relative}.s2 .gauges{flex:1;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:4px;position:relative;z-index:1}.s2 .g{width:60px;height:50px;position:relative}.s2 .g svg{width:60px;height:50px}.s2 .g .gl{font-size:10px;font-weight:700;fill:#e2e8f0}.s2 .g .gs{font-size:5px;fill:#64748b}.s2 .center-info{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:2}.s2 .center-info .ci{font-size:18px;font-weight:700;color:#22c55e}.s2 .center-info .cs{font-size:6px;color:#64748b}.s2 .bot{font-size:6px;color:#64748b;display:flex;justify-content:space-between;position:relative;z-index:1}
/* ===== S3: 时间线 ===== */
.s3{background:#111827;font-size:8px}.s3 .top{display:flex;justify-content:space-between;font-size:7px;color:#64748b;margin-bottom:4px}.s3 .timeline{flex:1;display:flex;flex-direction:column;gap:2px;overflow:hidden}.s3 .te{display:flex;align-items:center;gap:4px;padding:3px 4px;background:#1e293b;border-radius:4px;border-left:2px solid}.s3 .te.t1{border-color:#22c55e}.s3 .te.t2{border-color:#3b82f6}.s3 .te.t3{border-color:#f59e0b}.s3 .te.t4{border-color:#ef4444}.s3 .te .tt{color:#94a3b8;min-width:30px;font-family:monospace}.s3 .te .tl{color:#e2e8f0;flex:1}.s3 .te .td{color:#64748b}.s3 .sig{font-size:6px;color:#64748b;display:flex;gap:6px;margin-top:3px}
/* ===== S4: 轮播卡 ===== */
.s4{background:#0f172a;position:relative}.s4 .carousel{flex:1;display:flex;overflow:hidden;position:relative}.s4 .slide{min-width:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;transition:transform .5s;padding:4px}.s4 .slide .sv{font-size:28px;font-weight:700}.s4 .slide .sv.g{color:#22c55e}.s4 .slide .sv.b{color:#60a5fa}.s4 .slide .sv.o{color:#f59e0b}.s4 .slide .sl{font-size:8px;color:#64748b;margin-top:2px}.s4 .slide .sm{font-size:9px;color:#94a3b8;margin-top:4px;display:flex;gap:8px}.s4 .dots{position:absolute;bottom:4px;left:0;right:0;display:flex;justify-content:center;gap:3px;z-index:1}.s4 .dots span{width:5px;height:5px;border-radius:50%;background:#334155}.s4 .dots span.active{background:#3b82f6}
/* ===== S5: 双屏对比 ===== */
.s5{background:#0f172a;display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:6px}.s5 .panel{display:flex;flex-direction:column;gap:3px;padding:6px;border-radius:6px}.s5 .panel.l{background:#22c55e11;border:1px solid #22c55e33}.s5 .panel.r{background:#3b82f611;border:1px solid #3b82f633}.s5 .ph{font-size:7px;color:#64748b;text-align:center;text-transform:uppercase;letter-spacing:1px}.s5 .pv{font-size:22px;font-weight:700;text-align:center;flex:1;display:flex;align-items:center;justify-content:center}.s5 .pv.g{color:#22c55e}.s5 .pv.b{color:#60a5fa}.s5 .prow{display:flex;justify-content:space-between;font-size:7px;padding:2px 4px;background:#00000022;border-radius:3px}.s5 .sig{grid-column:1/-1;font-size:6px;color:#64748b;display:flex;gap:6px;justify-content:center;margin-top:2px}
/* ===== S6: 波形噪音 ===== */
.s6{background:#0a0a0a;position:relative;overflow:hidden}.s6 .wave-bg{position:absolute;bottom:0;left:0;right:0;height:60%}.s6 .wave-bg svg{width:100%;height:100%}.s6 .content{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;justify-content:center;padding:6px}.s6 .c-top{display:flex;justify-content:space-between;font-size:7px;color:#64748b;margin-bottom:auto}.s6 .c-main{display:flex;flex-direction:column;align-items:center}.s6 .c-main .db{font-size:28px;font-weight:200;color:#22c55e}.s6 .c-main .lb{font-size:8px;color:#64748b}.s6 .c-bot{display:flex;gap:8px;font-size:6px;color:#64748b;margin-top:auto;justify-content:space-between}
/* ===== S7: 雷达图 ===== */
.s7{background:#0f172a;position:relative;display:flex}.s7 .radar-wrap{flex:1;position:relative;display:flex;align-items:center;justify-content:center}.s7 .radar-svg{width:100px;height:100px}.s7 .radar-center{position:absolute;text-align:center}.s7 .radar-center .rn{font-size:14px;font-weight:700;color:#22c55e}.s7 .radar-center .rl{font-size:6px;color:#64748b}.s7 .labels{position:absolute;width:100%;height:100%;top:0;left:0;pointer-events:none}.s7 .labels span{position:absolute;font-size:5px;color:#64748b}.s7 .extra{position:absolute;bottom:4px;left:6px;right:6px;display:flex;justify-content:space-between;font-size:6px;color:#64748b}
/* ===== S8: 信息流 ===== */
.s8{background:#111827;font-size:7px}.s8 .s8-top{display:flex;justify-content:space-between;font-size:6px;color:#64748b;margin-bottom:3px}.s8 .feed{flex:1;display:flex;flex-direction:column;gap:2px;overflow:hidden}.s8 .fi{display:flex;align-items:center;gap:4px;padding:2px 4px;background:#1e293b;border-radius:3px;font-size:7px}.s8 .fi .fi-i{width:14px;text-align:center}.s8 .fi .fi-t{color:#94a3b8;flex:1}.s8 .fi .fi-v{font-weight:600}.s8 .fi .fi-v.g{color:#22c55e}.s8 .fi .fi-v.o{color:#f59e0b}.s8 .sig{font-size:5px;color:#64748b;display:flex;gap:4px;margin-top:2px}
/* ===== S9: 环形节能 ===== */
.s9{background:#0f172a;position:relative;display:flex}.s9 .ring-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative}.s9 .ring-svg{width:90px;height:90px}.s9 .ring-center{position:absolute;text-align:center}.s9 .ring-center .rv{font-size:14px;font-weight:700;color:#22c55e}.s9 .ring-center .rl{font-size:6px;color:#64748b}.s9 .ring-side{position:absolute;right:6px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:3px}.s9 .ring-side .rs{font-size:7px;color:#94a3b8;background:#1e293b;padding:3px 6px;border-radius:4px;display:flex;justify-content:space-between;gap:6px}.s9 .ring-side .rs .rv{font-weight:600}.s9 .bot{position:absolute;bottom:4px;left:6px;right:6px;display:flex;justify-content:space-between;font-size:6px;color:#64748b}
/* ===== S10: 全息HUD ===== */
.s10{background:radial-gradient(ellipse at center,#0c1929,#000)}.s10 .hud{flex:1;display:flex;flex-direction:column;position:relative;z-index:1}.s10 .hud .h-top{display:flex;justify-content:space-between;font-size:6px;color:#60a5fa66;margin-bottom:auto}.s10 .hud .h-main{display:flex;flex:1;gap:4px}.s10 .hud .h-left{flex:1;display:flex;flex-direction:column;justify-content:center;gap:2px}.s10 .hud .h-left .hl{font-size:6px;color:#60a5fa44;text-transform:uppercase;letter-spacing:1px}.s10 .hud .h-left .hv{font-size:22px;font-weight:300;color:#60a5fa;text-shadow:0 0 15px #60a5fa44}.s10 .hud .h-left .hv.g{color:#22c55e;text-shadow:0 0 15px #22c55e44}.s10 .hud .h-right{width:50%;display:grid;grid-template-columns:1fr 1fr;gap:2px}.s10 .hud .h-right .hr{background:#60a5fa08;border:1px solid #60a5fa22;border-radius:4px;padding:4px;text-align:center}.s10 .hud .h-right .hr .hv2{font-size:10px;font-weight:600;color:#94a3b8}.s10 .hud .h-right .hr .hl2{font-size:5px;color:#60a5fa44}.s10 .h-bot{font-size:5px;color:#60a5fa44;display:flex;gap:4px;margin-top:auto}
/* ===== S11: 抽屉切换 ===== */
.s11{background:#0f172a;overflow:hidden;position:relative}.s11 .drawer-track{display:flex;flex:1;transition:transform .3s}.s11 .drawer{min-width:100%;display:flex;flex-direction:column;justify-content:center;padding:8px}.s11 .drawer .dv{font-size:24px;font-weight:700;text-align:center}.s11 .drawer .dv.g{color:#22c55e}.s11 .drawer .dv.b{color:#60a5fa}.s11 .drawer .dv.o{color:#f59e0b}.s11 .drawer .dl{text-align:center;font-size:8px;color:#64748b;margin-top:2px}.s11 .drawer .dm{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-top:6px}.s11 .drawer .dm .d{padding:4px;background:#1e293b;border-radius:4px;text-align:center;font-size:7px}.s11 .drawer .dm .d .dv2{font-weight:600;color:#94a3b8}.s11 .drawer .dm .d .dl2{color:#64748b;font-size:6px}.s11 .d-nav{position:absolute;bottom:4px;left:0;right:0;display:flex;justify-content:center;gap:4px;z-index:1}.s11 .d-nav span{width:6px;height:6px;border-radius:50%;background:#334155;cursor:pointer}.s11 .d-nav span.active{background:#3b82f6}
/* ===== S12: 极简信息 ===== */
.s12{background:#000;justify-content:center;align-items:center;text-align:center;position:relative}.s12 .s12-main{position:relative;z-index:1}.s12 .s12-main .s12-line{font-size:7px;color:#64748b;letter-spacing:3px;text-transform:uppercase;margin-bottom:4px}.s12 .s12-main .s12-big{font-size:36px;font-weight:100;margin-bottom:2px;transition:all .5s}.s12 .s12-main .s12-big.g{color:#22c55e}.s12 .s12-main .s12-big.b{color:#60a5fa}.s12 .s12-main .s12-big.o{color:#f59e0b}.s12 .s12-main .s12-sub{font-size:8px;color:#64748b}.s12 .s12-footer{position:absolute;bottom:6px;left:8px;right:8px;display:flex;justify-content:space-between;font-size:6px;color:#334155}
</style>
</head>
<body>
<h1>🦞 IPS屏幕设计集 v2 · 12种数据架构</h1>
<p class="sub">每种风格使用完全不同的数据布局方式 · 点击全屏预览，点切换模式看1人/2人/3人/多人/屏保</p>
<div class="grid" id="gallery"></div>
<script>
var styles = [
  {id:'s1',name:'卡片瀑布',tag:'MASONRY',data:'变高卡片·人数占2倍·PMS对比'},
  {id:'s2',name:'仪表集群',tag:'GAUGES',data:'半圆仪表·中心POI·省电指针'},
  {id:'s3',name:'时间线',tag:'TIMELINE',data:'全天事件流·噪音时序·活动轨迹'},
  {id:'s4',name:'轮播卡',tag:'CAROUSEL',data:'自动切换·一页一个数据维度'},
  {id:'s5',name:'双屏对比',tag:'SPLIT',data:'检测vsPMS·双栏对照·颜色区分'},
  {id:'s6',name:'波形噪音',tag:'WAVE',data:'波形为主·噪音大数字·声纹频谱'},
  {id:'s7',name:'雷达图',tag:'RADAR',data:'五维雷达·整体健康度·空间评估'},
  {id:'s8',name:'信息流',tag:'FEED',data:'滚动消息·实时事件·类通知栏'},
  {id:'s9',name:'环形节能',tag:'RING',data:'节能进度环·省电指标·累计数据'},
  {id:'s10',name:'全息HUD',tag:'HOLO',data:'科幻叠层·数据网格·蓝绿光效'},
  {id:'s11',name:'抽屉切换',tag:'DRAWER',data:'左右滑动·分类数据·三栏底格'},
  {id:'s12',name:'极简信息',tag:'MINIMAL',data:'一屏一数·大字微标·自动轮换'},
];
var modes = ['1人','2人','3人','多人','屏保'];

// 每种风格生成不同内容
function renderStyle(s, mode, preview) {
  var sz = preview ? '28px' : '18px';
  switch(s.id) {
    case 's1': return s1html(mode, sz);
    case 's2': return s2html(mode, sz);
    case 's3': return s3html(mode, sz);
    case 's4': return s4html(mode, sz);
    case 's5': return s5html(mode, sz);
    case 's6': return s6html(mode, sz);
    case 's7': return s7html(mode, sz);
    case 's8': return s8html(mode, sz);
    case 's9': return s9html(mode, sz);
    case 's10': return s10html(mode, sz);
    case 's11': return s11html(mode, sz);
    case 's12': return s12html(mode, sz);
  }
}

// S1: 卡片瀑布
function s1html(mode, sz) {
  var n = {1:1,2:2,3:3}[{1人:1,2人:2,3人:3,多人:4}[mode]];
  var nc = n===1?'g':n===2?'b':'o';
  if (mode==='屏保') return '<div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center"><div style="font-size:18px;font-weight:300;color:#64748b">ECO MODE</div><div style="font-size:24px;font-weight:700;color:#22c55e">2.4kWh</div><div style="font-size:7px;color:#64748b">今日省电·无人3h</div></div>';
  return '<div class="masonry"><div class="mc large"><div style="display:flex;flex-direction:column;min-width:60px"><div class="mv '+nc+'">'+n+'</div><div class="ml">灵犀检测</div></div><div style="display:flex;flex-direction:column;min-width:60px;border-left:1px solid #334155;padding-left:8px"><div class="mv b">'+n+'</div><div class="ml">PMS登记</div></div><span class="pms-tag">✅ 一致</span></div><div class="mc"><div class="mv" style="color:#60a5fa;font-size:'+(parseInt(sz)+4)+'px">26°</div><div class="ml">温度</div></div><div class="mc"><div class="mv">42dB</div><div class="ml">噪音</div></div><div class="mc"><div class="mv" style="font-size:'+(parseInt(sz)+4)+'px;color:#22c55e">2.4</div><div class="ml">节省/kWh</div></div><div class="mc"><div class="mv">58%</div><div class="ml">湿度</div></div></div><div class="sig"><span>4G ████</span><span>WiFi ███░</span><span>BLE ██░░</span></div>';
}

// S2: 仪表集群
function s2html(mode, sz) {
  if (mode==='屏保') return '<div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:1;position:relative"><div style="font-size:8px;color:#64748b">ENERGY</div><div style="font-size:20px;font-weight:300;color:#22c55e">2.4kWh</div><div style="font-size:6px;color:#64748b">idle 3h</div></div><div class="bot"><span>4G ████</span><span>WiFi ███░</span></div>';
  return '<div class="gauges"><div class="g"><svg viewBox="0 0 60 50"><path d="M5,45 A25,25 0 0,1 55,45" stroke="#1e293b" stroke-width="6" fill="none"/><path d="M5,45 A25,25 0 0,1 55,45" stroke="#22c55e" stroke-dasharray="78.5" stroke-dashoffset="15" stroke-width="6" fill="none" transform="rotate(0,30,45)"/><text x="30" y="42" class="gl" text-anchor="middle">26°</text><text x="30" y="48" class="gs" text-anchor="middle">室温</text></svg></div><div class="g"><svg viewBox="0 0 60 50"><path d="M5,45 A25,25 0 0,1 55,45" stroke="#1e293b" stroke-width="6" fill="none"/><path d="M5,45 A25,25 0 0,1 55,45" stroke="#f59e0b" stroke-dasharray="78.5" stroke-dashoffset="35" stroke-width="6" fill="none"/><text x="30" y="42" class="gl" text-anchor="middle" fill="#f59e0b">42dB</text><text x="30" y="48" class="gs" text-anchor="middle">噪音</text></svg></div><div class="g"><svg viewBox="0 0 60 50"><path d="M5,45 A25,25 0 0,1 55,45" stroke="#1e293b" stroke-width="6" fill="none"/><path d="M5,45 A25,25 0 0,1 55,45" stroke="#60a5fa" stroke-dasharray="78.5" stroke-dashoffset="50" stroke-width="6" fill="none"/><text x="30" y="42" class="gl" text-anchor="middle" fill="#60a5fa">58%</text><text x="30" y="48" class="gs" text-anchor="middle">湿度</text></svg></div></div><div class="center-info"><div class="ci">'+({1:'1',2:'2',3:'3',多人:'3+'}[mode])+'</div><div class="cs">ROOM 301</div></div><div class="bot"><span>4G ████</span><span>WiFi ███░</span><span>BLE ██░░</span><span style="color:#22c55e">+2.4kWh</span></div>';
}

// S3: 时间线
function s3html(mode, sz) {
  if (mode==='屏保') return '<div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center"><div style="font-size:8px;color:#64748b">⚡ 节能中</div><div style="font-size:20px;font-weight:700;color:#22c55e">2.4 kWh</div><div style="font-size:7px;color:#64748b">无人 · 3h12m</div></div>';
  var n = {1:'1',2:'2',3:'3',多人:'3+'}[mode];
  return '<div class="top"><span>🦞 lingxi · 301</span><span>入住: '+n+'人</span></div><div class="timeline"><div class="te t1"><span class="tt">07:15</span><span class="tl">✅ '+n+'人入住</span><span class="td">PMS一致</span></div><div class="te t2"><span class="tt">08:30</span><span class="tl">🚶 外出</span><span class="td">预计11:00</span></div><div class="te t3"><span class="tt">09:45</span><span class="tl">🔊 女性谈话 62dB</span><span class="td">持续3min</span></div><div class="te t3"><span class="tt">10:02</span><span class="tl">🚪 关门声 72dB</span><span class="td">异常</span></div><div class="te t4"><span class="tt">10:15</span><span class="tl">🔊 男性说话 58dB</span><span class="td">正常</span></div></div><div class="sig"><span>4G ████</span><span>WiFi ███░</span><span>BLE ██░░</span><span style="flex:1;text-align:right;color:#22c55e">+2.4kWh</span></div>';
}

// S4: 轮播卡
function s4html(mode, sz) {
  if (mode==='屏保') return '<div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center"><div style="font-size:8px;color:#64748b">⚡ SAVING</div><div style="font-size:22px;font-weight:700;color:#22c55e">2.4kWh</div><div style="font-size:7px;color:#64748b">today · room 301</div></div><div class="dots"><span></span><span></span><span></span></div>';
  var n = {1:'1',2:'2',3:'3',多人:'3+'}[mode];
  var items = [
    {v:n+'人',l:'入住人数',c:'g',m:'灵犀检测 ✓'},
    {v:'26°C',l:'室温',c:'b',m:'空调26°C · 湿度58%'},
    {v:'42dB',l:'噪音',c:'o',m:'安静 · 无异常'},
    {v:'2.4kWh',l:'今日省电',c:'g',m:'累计 38.6kWh'},
  ];
  var slides = '';
  items.forEach(function(it, i){
    slides += '<div class="slide"><div class="sv '+it.c+'">'+it.v+'</div><div class="sl">'+it.l+'</div><div class="sm">'+it.m+'</div></div>';
  });
  return '<div class="carousel" id="c4">'+slides+'</div><div class="dots">'+items.map(function(_,i){return '<span'+(i===0?' class="active"':'')+'></span>'}).join('')+'</div>';
}

// S5: 双屏对比
function s5html(mode, sz) {
  var n = {1:'1',2:'2',3:'3',多人:'3+'}[mode];
  if (mode==='屏保') return '<div style="grid-column:1/-1;display:flex;flex-direction:column;justify-content:center;align-items:center"><div style="font-size:8px;color:#64748b">SAVING</div><div style="font-size:20px;font-weight:700;color:#22c55e">2.4kWh</div><div style="font-size:6px;color:#64748b">无人 · 3h</div></div><div class="sig">eco · room 301</div>';

  if (mode==='屏保') return '<div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center"><div style="font-size:8px;color:#64748b">ECO</div><div style="font-size:20px;font-weight:700;color:#22c55e">2.4 kWh</div><div style="font-size:7px;color:#64748b">无人 · 节能中</div></div>';

// 渲染画廊
function render() {
  var g = document.getElementById('gallery');
  styles.forEach(function(s, i) {
    g.innerHTML += '<div class="sc-card" onclick="openPreview('+i+')"><div class="label"><span>'+s.name+'</span><span style="font-size:8px;color:#64748b">'+s.data+'</span><span class="tag" style="background:#3b82f6;color:#fff">'+s.tag+'</span></div><div class="ips '+s.id+'">'+renderStyle(s,'1人')+'</div></div>';
  });
}

// 全屏预览
function openPreview(idx) {
  var s = styles[idx];
  var o = document.createElement('div');
  o.style.cssText = 'position:fixed;inset:0;background:#000;z-index:1000;display:flex;flex-direction:column;padding:20px';
  var h = document.createElement('div');
  h.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:12px';
  h.innerHTML = '<div><strong style="font-size:16px">'+s.name+'</strong><span style="color:#64748b;font-size:11px;margin-left:8px">'+s.data+'</span></div><div><button class="cbtn" onclick="event.stopPropagation()" style="background:#3b82f6;color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;margin-right:6px;font-size:12px">切换模式</button><button onclick="this.parentElement.parentElement.parentElement.remove()" style="background:#ef4444;color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px">✕</button></div>';
  o.appendChild(h);
  var w = document.createElement('div');
  w.style.cssText = 'flex:1;display:flex;justify-content:center;align-items:center';
  var m = document.createElement('div');
  m.style.cssText = 'width:320px;height:240px;border-radius:12px;overflow:hidden;box-shadow:0 0 40px rgba(59,130,246,0.1)';
  m.id = 'fp';
  m.className = 'ips '+s.id;
  m.innerHTML = renderStyle(s,'1人', true);
  w.appendChild(m);
  o.appendChild(w);
  var b = document.createElement('div');
  b.style.cssText = 'text-align:center;margin-top:12px;font-size:11px;color:#64748b';
  b.id = 'mi';
  b.textContent = '当前: 1人 ｜ 点击切换循环所有模式';
  o.appendChild(b);
  document.body.appendChild(o);
  var ci = 0;
  o.querySelector('.cbtn').onclick = function(e){
    e.stopPropagation();
    ci = (ci+1)%modes.length;
    document.getElementById('fp').innerHTML = renderStyle(s, modes[ci], true);
    document.getElementById('mi').textContent = '当前: '+modes[ci];
  };
}

// S11 抽屉导航（预览模式用）
function drawerGo(idx) {
  var t = document.getElementById('d11');
  if (t) t.style.transform = 'translateX(-'+(idx*100)+'%)';
  var d = t && t.parentElement;
  if (d) d.querySelectorAll('.d-nav span').forEach(function(s,i){s.className=i===idx?'active':''});
}

render();
</script>
